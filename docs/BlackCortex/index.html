<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackCortex — 研究分析</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --text-muted: rgba(232,232,240,0.45);
      --accent: #6ee7f7;
      --accent-warm: #fbbf24;
      --accent-purple: #a78bfa;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* header */
    header {
      padding: 3rem 5% 2rem;
      text-align: center;
      position: relative;
    }
    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(110,231,247,0.12) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(167,139,250,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .header-inner { position: relative; z-index: 1; }
    header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #e8e8f0 0%, rgba(110,231,247,0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      margin-top: 0.75rem;
      color: var(--text-muted);
      font-size: 1rem;
    }
    header .badge {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.3rem 1rem;
      background: rgba(110,231,247,0.08);
      border: 1px solid rgba(110,231,247,0.20);
      border-radius: 20px;
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    /* main */
    main {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 5% 4rem;
    }

    /* section label */
    .section-label {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1.2rem;
      padding-left: 0.5rem;
    }

    /* cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem 1.5rem;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .card.cyan::before { background: var(--accent); }
    .card.warm::before { background: var(--accent-warm); }

    .card:hover {
      background: var(--surface-hover);
      transform: translateY(-3px);
    }
    .card.cyan:hover { border-color: rgba(110,231,247,0.25); }
    .card.warm:hover { border-color: rgba(251,191,36,0.25); }

    .card-icon { font-size: 2rem; }
    .card-title {
      font-size: 1.15rem;
      font-weight: 700;
    }
    .card-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.55;
      flex: 1;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.25rem;
    }
    .card-tag {
      font-size: 0.72rem;
      padding: 0.2rem 0.65rem;
      border-radius: 20px;
      background: rgba(110,231,247,0.08);
      color: var(--accent);
      border: 1px solid rgba(110,231,247,0.15);
    }
    .card.warm .card-tag {
      background: rgba(251,191,36,0.08);
      color: var(--accent-warm);
      border-color: rgba(251,191,36,0.15);
    }

    footer {
      text-align: center;
      padding: 2rem 5%;
      font-size: 0.78rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>BlackCortex</h1>
    <p>研究分析專區 — 知識沉積與投資機會追蹤</p>
    <span class="badge">持續更新中</span>
  </div>
</header>

<main>
  <p class="section-label">研究模組</p>
  <div class="cards">

    <a href="knowledges/index.html" class="card cyan">
      <div class="card-icon">🧠</div>
      <div class="card-title">每日知識庫</div>
      <div class="card-desc">每日知識文章，涵蓋 AI、能源、科技與世界模型等領域。JSON 格式管理，適合快速檢索與延伸應用。</div>
      <div class="card-tags">
        <span class="card-tag">每日更新</span>
        <span class="card-tag">AI / 科技</span>
        <span class="card-tag">JSON</span>
      </div>
    </a>

    <a href="stock_analysis/index.html" class="card warm">
      <div class="card-icon">📊</div>
      <div class="card-title">股票研究分析</div>
      <div class="card-desc">全球產業趨勢 × 台灣可能被低估概念股。每日報告， RESEARCHER 黑探提供研究內容。</div>
      <div class="card-tags">
        <span class="card-tag">台股研究</span>
        <span class="card-tag">產業趨勢</span>
        <span class="card-tag">非投資建議</span>
      </div>
    </a>

  </div>
</main>

<footer>
  <p>BlackCortex 由 <a href="https://github.com/Oren2026">Oren</a> 維護</p>
</footer>

</body>
</html>
