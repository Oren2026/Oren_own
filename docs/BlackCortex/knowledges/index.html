<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oren 黑輪 🐟</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== Crypto Module Styles ===== */
        .crypto-module {
            max-width: 1200px;
            margin: 0 auto 40px;
        }
        .crypto-module h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .crypto-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .crypto-tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
        }
        .crypto-tab:hover:not(.active) {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
        .crypto-tab.active {
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            color: #fff;
            border-color: transparent;
        }
        .crypto-content {
            display: none;
        }
        .crypto-content.active {
            display: block;
        }
        .chart-container {
            width: 100%;
            height: 450px;
            border-radius: 12px;
            overflow: hidden;
            background: #1e2a3a;
            margin-bottom: 16px;
        }
        .chart-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .coin-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .coin-info .coin-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #00d4ff;
        }
        .coin-info .coin-price {
            font-size: 1em;
            color: #fff;
        }
        .coin-info .coin-change {
            font-size: 0.9em;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .coin-info .coin-change.up { background: rgba(0,255,100,0.2); color: #00ff64; }
        .coin-info .coin-change.down { background: rgba(255,60,60,0.2); color: #ff3c3c; }
        .coin-badge {
            padding: 3px 8px;
            background: rgba(255,180,0,0.2);
            color: #ffb400;
            border-radius: 4px;
            font-size: 0.8em;
        }
        .news-card {
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .news-card .news-title {
            color: #fff;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.95em;
        }
        .news-card .news-summary {
            color: #999;
            font-size: 0.85em;
            line-height: 1.5;
        }
        .news-card .news-tags {
            display: flex;
            gap: 5px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .news-card .news-tag {
            padding: 2px 8px;
            background: rgba(0,212,255,0.15);
            border-radius: 8px;
            font-size: 0.75em;
            color: #00d4ff;
        }
        .loading { text-align: center; padding: 40px; color: #666; }
        .loading-spinner {
            display: inline-block;
            width: 30px; height: 30px;
            border: 3px solid rgba(0,212,255,0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg { text-align: center; padding: 30px; color: #ff6b6b; }

        /* ===== Divider ===== */
        .section-divider {
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <!-- ===== Crypto Module ===== -->
    <div class="crypto-module" id="cryptoModule">
        <h2>📈 加密貨幣</h2>
        <div class="crypto-tabs" id="cryptoTabs">
            <button class="crypto-tab active" data-tab="TAO">TAO</button>
            <button class="crypto-tab" data-tab="FET">FET</button>
            <button class="crypto-tab" data-tab="TOPVOL">熱門成交量</button>
            <button class="crypto-tab" data-tab="TOPMCAP">熱門市值</button>
        </div>
        <div class="crypto-content active" id="tab-TAO">
            <div class="loading"><div class="loading-spinner"></div> 載入中...</div>
        </div>
        <div class="crypto-content" id="tab-FET">
            <div class="loading"><div class="loading-spinner"></div> 載入中...</div>
        </div>
        <div class="crypto-content" id="tab-TOPVOL">
            <div class="loading"><div class="loading-spinner"></div> 載入中...</div>
        </div>
        <div class="crypto-content" id="tab-TOPMCAP">
            <div class="loading"><div class="loading-spinner"></div> 載入中...</div>
        </div>
    </div>

    <div class="section-divider"></div>

    <!-- ===== Knowledge Base ===== -->
    <h1>🐟 Oren 黑輪 - 知識庫</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜尋文章...">
        <button onclick="search()">🔍</button>
    </div>
    
    <div class="status-bar">
        <div class="status-item">
            <div class="value" id="totalCount">0</div>
            <div class="label">總文章</div>
        </div>
        <div class="status-item">
            <div class="value" id="todayCount">0</div>
            <div class="label">今日</div>
        </div>
        <div class="status-item">
            <div class="value" id="lastUpdate">--</div>
            <div class="label">最後更新</div>
        </div>
    </div>
    
    <div class="tabs" id="dateTabs"></div>
    <div class="tag-cloud" id="tagCloud"></div>
    <div class="articles" id="articles"></div>

    <script src="app.js"></script>
    <script src="crypto.js"></script>
</body>
</html>
