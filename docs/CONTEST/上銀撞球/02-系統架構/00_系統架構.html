<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系統架構 | 上銀撞球 2026</title>
  <link rel="stylesheet" href="../../assets/css/shared.css">
  <style>
    :root {
      --accent: #fbbf24;
      --accent-rgb: 251, 191, 36;
    }
    body { background: var(--bg); }

    .header {
      background: #f4f6f2;
      border-radius: 0 0 16px 16px;
      overflow: hidden;
      position: relative;
    }
    .header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% -10%, rgba(251,191,36,0.15) 0%, transparent 65%);
      pointer-events: none;
    }
    .header-content { position: relative; z-index: 1; }
    .header h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 8px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .header h1.in-view { opacity: 1; transform: translateY(0); }
    .header .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 8px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .header .subtitle.in-view { opacity: 1; transform: translateY(0); }
    .header .back-link {
      display: inline-block;
      margin-top: 1rem;
      color: #4a4a4a;
      text-decoration: none;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.7s ease 0.1s, transform 0.7s ease 0.1s, color 0.2s;
    }
    .header .back-link.in-view { opacity: 1; transform: translateY(0); }
    .header .back-link:hover { color: var(--accent); }

    .container { max-width: 1100px; margin: 0 auto; padding: 1rem 2rem; }

    .content-card { background: var(--card-bg); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 1.5rem; }
    .placeholder { text-align: center; padding: 3rem; color: var(--text-light); }
    .placeholder-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1 data-delay="0">⚙️ 系統架構</h1>
      <p class="subtitle" data-delay="1">技術架構規劃（建構中）</p>
      <a href="../index.html" class="back-link" data-delay="2">← 返回首頁</a>
    </div>
  </header>

  <main class="container">
    <div class="content-card">
      <div class="placeholder">
        <div class="placeholder-icon">🚧</div>
        <h3>系統架構規劃中</h3>
        <p style="margin-top: 0.5rem;">待確認 HIWIN 機械手臂規格與比賽任務後填寫</p>
      </div>
    </div>

    <div class="content-card">
      <div class="section-title">📐 預計架構方向</div>
      <ul style="padding-left: 1.2rem;">
        <li style="margin-bottom: 0.5rem;">🤖 <strong>機械手臂</strong>：HIWIN 智慧機器手（主辦單位提供）</li>
        <li style="margin-bottom: 0.5rem;">🎱 <strong>撞球機構</strong>：3D 列印桿夾持 + 角度調整機構</li>
        <li style="margin-bottom: 0.5rem;">👁️ <strong>視覺系統</strong>：OpenCV 球/洞口偵測</li>
        <li style="margin-bottom: 0.5rem;">🧠 <strong>策略系統</strong>：擊球路徑規劃 + 決策</li>
        <li>⚡ <strong>控制整合</strong>：手臂運動學 +力道控制</li>
      </ul>
    </div>
  </main>

  <footer class="footer">
    <p>上銀撞球 2026 | 由 <a href="https://github.com/Oren2026">Oren</a> 維護</p>
  </footer>

  <script>
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var delay = parseInt(entry.target.dataset.delay || 0);
          setTimeout(function() {
            entry.target.classList.add('in-view');
          }, delay * 100);
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.header h1, .header .subtitle, .header .back-link').forEach(function(el) {
      io.observe(el);
    });
  </script>
</body>
</html>
