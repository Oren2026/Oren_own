<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>採購清單 | 上銀撞球 2026</title>
  <link rel="stylesheet" href="../../assets/css/shared.css">
  <style>
    :root {
      --accent: #fbbf24;
      --accent-rgb: 251, 191, 36;
    }
    body { background: var(--bg); }

    .header {
      background: #f4f6f2;
      border-radius: 0 0 16px 16px;
      overflow: hidden;
      position: relative;
    }
    .header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% -10%, rgba(251,191,36,0.15) 0%, transparent 65%);
      pointer-events: none;
    }
    .header-content { position: relative; z-index: 1; }
    .header h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 8px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .header h1.in-view { opacity: 1; transform: translateY(0); }
    .header .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 8px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .header .subtitle.in-view { opacity: 1; transform: translateY(0); }
    .header .back-link {
      display: inline-block;
      margin-top: 1rem;
      color: #4a4a4a;
      text-decoration: none;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.7s ease 0.1s, transform 0.7s ease 0.1s, color 0.2s;
    }
    .header .back-link.in-view { opacity: 1; transform: translateY(0); }
    .header .back-link:hover { color: var(--accent); }

    .container { max-width: 1100px; margin: 0 auto; padding: 1rem 2rem; }

    .content-card { background: var(--card-bg); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border); }
    th { background: var(--bg); font-weight: 600; color: var(--text-light); font-size: 0.85rem; text-transform: uppercase; }
    tr:hover { background: var(--bg); }
    .tag-3d { display: inline-block; background: #dbeafe; color: #1e40af; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.75rem; }
    .tag-buy { display: inline-block; background: #fef3c7; color: #92400e; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.75rem; }
    .placeholder { text-align: center; padding: 3rem; color: var(--text-light); }

    /* Content card fade-in */
    .info-card, .stage-card, .arch-box, .table-wrap, .content-card, .table-card, .list-card, .arch-card, .confirm-card {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .info-card.in-view, .stage-card.in-view, .arch-box.in-view, .table-wrap.in-view,
    .content-card.in-view, .table-card.in-view, .list-card.in-view,
    .arch-card.in-view, .confirm-card.in-view {
      opacity: 1; transform: translateY(0);
    }
    /* Table shared */
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; margin-bottom: 1rem; }
    table th { background: #f4f6f2; font-weight: 600; font-size: 0.82rem; color: #4a4a4a; padding: 0.5rem 0.75rem; border-bottom: 2px solid rgba(0,0,0,0.1); }
    table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(0,0,0,0.06); font-size: 0.88rem; }
    table tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1 data-delay="0">🛒 採購清單</h1>
      <p class="subtitle" data-delay="1">3D 列印優先 + 補助 15,000 元</p>
      <a href="../index.html" class="back-link" data-delay="2">← 返回首頁</a>
    </div>
  </header>

  <main class="container">
    <div class="content-card">
      <h2 style="margin-bottom: 1rem;">📌 採購原則</h2>
      <ul style="padding-left: 1.2rem; margin-bottom: 1rem;">
        <li style="margin-bottom: 0.5rem;">🖨️ <strong>優先 3D 列印</strong>：可自行設計的機構零件，優先列印</li>
        <li style="margin-bottom: 0.5rem;">🛒 <strong>標準件採購</strong>：螺絲、軸承、金屬件等</li>
        <li>💰 <strong>補助申請</strong>：外島最高 15,000 元（補助核銷後撥款）</li>
      </ul>
    </div>

    <div class="content-card">
      <h2 style="margin-bottom: 1rem;">🔧 機構類（3D 列印）</h2>
      <div class="placeholder">
        <div style="font-size:3rem; margin-bottom:1rem; opacity:0.5;">🚧</div>
        <p>待機構設計確認後填寫</p>
      </div>
      <!-- <table>
        <thead>
          <tr><th>零件名稱</th><th>材料</th><th>數量</th><th>預估費用</th><th>狀態</th></tr>
        </thead>
        <tbody>
          <tr><td>撞球桿夾持機構</td><td><span class="tag-3d">3D列印</span></td><td>1</td><td>-</td><td>待規劃</td></tr>
        </tbody>
      </table> -->
    </div>

    <div class="content-card">
      <h2 style="margin-bottom: 1rem;">🔩 標準件（採購）</h2>
      <div class="placeholder">
        <div style="font-size:3rem; margin-bottom:1rem; opacity:0.5;">🚧</div>
        <p>待評估後填寫</p>
      </div>
    </div>

    <div class="content-card">
      <h2 style="margin-bottom: 1rem;">⚠️ 待確認項目</h2>
      <ul style="padding-left: 1.2rem;">
        <li>🤖 HIWIN 機械手臂是否已提供？</li>
        <li>🔌 控制板/電子零件是否已有？</li>
        <li>📷 視覺設備（攝影機/鏡頭）需求？</li>
      </ul>
    </div>
  </main>

  <footer class="footer">
    <p>上銀撞球 2026 | 由 <a href="https://github.com/Oren2026">Oren</a> 維護</p>
  </footer>

  <script>
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var delay = parseInt(entry.target.dataset.delay || 0);
          setTimeout(function() {
            entry.target.classList.add('in-view');
          }, delay * 100);
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.header h1, .header .subtitle, .header .back-link, .updated-box, .section, .doc-content, .info-card, .stage-card, .arch-box, .table-wrap, .content-card, .table-card, .list-card, .arch-card, .confirm-card, table').forEach(function(el) {
      io.observe(el);
    });
  </script>
</body>
</html>
