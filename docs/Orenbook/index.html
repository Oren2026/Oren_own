<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orenbook</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: Georgia, "Noto Serif TC", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .subtitle {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 30px;
        }

        /* 書本容器 */
        .book {
            width: 100%;
            max-width: 700px;
            height: 500px;
            perspective: 1500px;
            position: relative;
            margin-bottom: 20px;
        }

        /* 書本外觀 */
        .book-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        /* 左右兩頁 */
        .page {
            position: absolute;
            width: 50%;
            height: 100%;
            background: #f5f0e8;
            color: #222;
            padding: 30px 25px;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .page-left {
            left: 0;
            border-radius: 8px 0 0 8px;
            border-right: 1px solid #ddd;
        }

        .page-right {
            right: 0;
            border-radius: 0 8px 8px 0;
        }

        /* 書背效果 */
        .spine {
            position: absolute;
            left: 50%;
            width: 20px;
            height: 100%;
            transform: translateX(-50%);
            background: linear-gradient(to right, #ddd 0%, #fff 50%, #ddd 100%);
            z-index: 10;
        }

        /* 頁面陰影 */
        .page-left::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 30px;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.1), transparent);
        }

        .page-right::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 30px;
            height: 100%;
            background: linear-gradient(to left, rgba(0,0,0,0.1), transparent);
        }

        /* 頁面內容 */
        .page h2 {
            color: #1a1a2e;
            font-size: 1.2em;
            margin-bottom: 15px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 8px;
        }

        .page p {
            font-size: 0.95em;
            line-height: 1.8;
            margin-bottom: 12px;
            text-align: justify;
        }

        .page-number {
            position: absolute;
            bottom: 10px;
            font-size: 0.8em;
            color: #999;
        }

        .page-left .page-number { right: 15px; }
        .page-right .page-number { left: 15px; }

        /* 翻頁動畫 */
        .book-inner.flipped .page-left {
            transform: rotateY(-180deg);
            transform-origin: right center;
            transition: transform 0.8s ease;
        }

        .book-inner.flipped .page-right {
            transform: rotateY(180deg);
            transform-origin: left center;
            transition: transform 0.8s ease 0.1s;
        }

        /* 導航按鈕 */
        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .nav-btn {
            padding: 10px 30px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 0.95em;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .nav-btn:hover { opacity: 0.8; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* 指示器 */
        .page-indicator {
            text-align: center;
            color: #666;
            font-size: 0.85em;
            margin-bottom: 20px;
        }

        /* 封面 */
        .cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 20;
            transition: opacity 0.5s;
        }

        .cover.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .cover h2 {
            color: #00d4ff;
            font-size: 2em;
            margin-bottom: 15px;
            border: none;
        }

        .cover p {
            color: #888;
            font-size: 1em;
        }

        .cover .hint {
            margin-top: 30px;
            color: #444;
            font-size: 0.85em;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* 手機響應式 */
        @media (max-width: 600px) {
            .book { height: 400px; }
            .page { padding: 20px 15px; }
            .page h2 { font-size: 1em; }
            .page p { font-size: 0.85em; }
        }

        /* 打字機效果 */
        .typing {
            border-right: 2px solid #00d4ff;
            animation: blink 0.7s step-end infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        .typing-text {
            min-height: 1.5em;
        }
    </style>
</head>
<body>

    <h1>🐟 Orenbook</h1>
    <p class="subtitle">翻頁閱讀</p>

    <div class="book">
        <div class="book-inner" id="bookInner">
            <!-- 左頁 -->
            <div class="page page-left" id="pageLeft">
                <h2 id="leftTitle">目錄</h2>
                <div id="leftContent"></div>
                <div class="page-number" id="leftNum">—</div>
            </div>

            <!-- 書背 -->
            <div class="spine"></div>

            <!-- 右頁 -->
            <div class="page page-right" id="pageRight">
                <h2 id="rightTitle">第一頁</h2>
                <div id="rightContent"></div>
                <div class="page-number" id="rightNum">1</div>
            </div>

            <!-- 封面 -->
            <div class="cover" id="cover">
                <h2>🐟 Orenbook</h2>
                <p>黑皮與黑輪的知識書</p>
                <div class="hint">點擊「開始閱讀」翻開第一頁</div>
            </div>
        </div>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn" onclick="prevPage()" disabled>◀ 上一頁</button>
        <button class="nav-btn" id="nextBtn" onclick="nextPage()">下一頁 ▶</button>
    </div>

    <div class="page-indicator" id="indicator">點擊「開始閱讀」</div>

    <script>
        // 書本內容（之後可以動態載入）
        const PAGES = [
            {
                left: { title: "目錄", content: "<p>這是黑皮與黑輪的共同創作。</p><p>點擊「下一頁」開始閱讀。</p><p>未來章節將持續新增。</p>" },
                right: { title: "序", content: "<p>這是一本持續生長的書。</p><p>收錄我們感興趣的主題、思考與發現。</p><p>每一頁都是一次探索的足跡。</p>" }
            },
            {
                left: { title: "能源轉型", content: "<p>電網現代化是必然趨勢。</p><p>V2G、固態變壓器、第四代核能——</p><p>每一個技術都在重塑未來的能源版圖。</p>" },
                right: { title: "電網基礎設施", content: "<p>當雙向電流成為常態，</p><p>電網就不再是單向的輸送管線，</p><p>而是一張動態調節的智慧網路。</p>" }
            },
            {
                left: { title: "AI 與意識", content: "<p>機器學習可以分析「感覺」，</p><p>但無法真正「悟」到感覺。</p><p>這個缺口，是人類最後的獨特。</p>" },
                right: { title: "掌控感", content: "<p>當一切都自動化，</p><p>人類的價值在於「選擇」的權力，</p><p>在於願意承擔的責任。</p>" }
            }
        ];

        let currentPage = 0;
        let isOpen = false;

        function renderPage() {
            const page = PAGES[currentPage];
            if (!page) return;

            document.getElementById("leftTitle").textContent = page.left.title;
            document.getElementById("leftContent").innerHTML = page.left.content;
            document.getElementById("rightTitle").textContent = page.right.title;
            document.getElementById("rightContent").innerHTML = page.right.content;

            document.getElementById("leftNum").textContent = currentPage * 2;
            document.getElementById("rightNum").textContent = currentPage * 2 + 1;

            document.getElementById("indicator").textContent = `第 ${currentPage * 2 + 1} - ${currentPage * 2 + 2} 頁`;

            document.getElementById("prevBtn").disabled = currentPage === 0;
            document.getElementById("nextBtn").disabled = currentPage >= PAGES.length - 1;
        }

        function openBook() {
            const cover = document.getElementById("cover");
            const bookInner = document.getElementById("bookInner");
            cover.classList.add("hidden");
            setTimeout(() => {
                bookInner.classList.add("flipped");
            }, 300);
            isOpen = true;
            renderPage();
        }

        function nextPage() {
            if (!isOpen) {
                openBook();
                return;
            }
            if (currentPage < PAGES.length - 1) {
                currentPage++;
                renderPage();
            }
        }

        function prevPage() {
            if (!isOpen) return;
            if (currentPage > 0) {
                currentPage--;
                renderPage();
            } else {
                // 回到封面
                document.getElementById("bookInner").classList.remove("flipped");
                setTimeout(() => {
                    document.getElementById("cover").classList.remove("hidden");
                }, 400);
                isOpen = false;
                document.getElementById("indicator").textContent = "回到封面";
            }
        }

        // 鍵盤支援
        document.addEventListener("keydown", e => {
            if (e.key === "ArrowRight" || e.key === " ") nextPage();
            if (e.key === "ArrowLeft") prevPage();
        });

        // 初始
        document.getElementById("nextBtn").addEventListener("click", () => {
            if (!isOpen) openBook();
            else nextPage();
        });
    </script>

</body>
</html>
