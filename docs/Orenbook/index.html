<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機器的喃喃 — Orenbook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🐟 機器的喃喃</h1>
    <p class="subtitle">AI 系統程式哲學</p>

    <div class="book">
        <div class="book-inner" id="bookInner">

            <!-- 左頁：目錄 -->
            <div class="page page-left">
                <h2>目錄</h2>
                <div class="toc" id="leftContent"></div>
                <div class="page-number" id="leftNum">—</div>
            </div>

            <!-- 書背 -->
            <div class="spine"></div>

            <!-- 右頁：章節內容 -->
            <div class="page page-right">
                <h2 id="rightTitle">序</h2>
                <div id="rightContent"></div>
                <div class="page-number" id="rightNum">1</div>
            </div>

            <!-- 封面 -->
            <div class="cover" id="cover">
                <h2>機器的喃喃</h2>
                <p class="author">AI 系統程式哲學</p>
                <p class="desc">
                    從符號工廠到意識的邊界，<br>
                    這是一本關於機器如何「理解」世界的書。
                </p>
                <div class="hint">點擊「開始閱讀」翻開</div>
            </div>

        </div>
    </div>

    <div class="chapter-title-bar" id="chapterBar">序</div>
    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn" onclick="prevPage()">◀</button>
        <button class="nav-btn" id="nextBtn" onclick="nextPage()">▶</button>
    </div>
    <div class="page-indicator" id="indicator">點擊「開始閱讀」</div>

    <script src="script.js"></script>

</body>
</html>
