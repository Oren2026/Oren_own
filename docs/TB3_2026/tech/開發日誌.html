<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>開發日誌 | TB3 2026</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header class="header" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
    <h1>📝 開發日誌</h1>
    <p class="subtitle">TB3 2026 FIRA AutoRace</p>
    <a href="../index.html" style="display:inline-block;margin-top:1rem;color:white;opacity:0.85;">← 返回儀表板</a>
  </header>

  <main class="container">
    <div class="section">
      <div class="section-header"><span class="icon">🎯</span><h2>任務關卡進度</h2></div>
      <div class="section-content">
        <div class="mission-grid" id="mission-grid"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-header"><span class="icon">🛠️</span><h2>節點進度明細</h2></div>
      <div class="section-content" id="timeline"></div>
    </div>
  </main>

  <div class="modal" id="mission-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">—</h2>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <footer class="footer">
    <p>TB3 2026 FIRA AutoRace | 由 <a href="https://github.com/Oren2026" style="color:var(--primary);">Oren</a> 維護</p>
  </footer>

  <script src="../assets/js/main.js"></script>
  <script>
    fetchAllMissions('../').then(function(missions) {
      renderMissionGrid(missions, 'mission-grid');
      var tl = document.getElementById('timeline');
      if (!tl) return;
      tl.innerHTML = missions
        .filter(function(m) { return m.category !== 'base'; })
        .sort(function(a, b) { return MISSION_IDS.indexOf(a.id) - MISSION_IDS.indexOf(b.id); })
        .map(function(m) {
          var s = computeMissionStatus(m);
          var icon = MISSION_ICONS[m.id] || '❓';
          var subDone = (m.subConcepts || []).filter(function(x) { return x.status === 'done'; }).length;
          var subTotal = (m.subConcepts || []).length;
          var subs = (m.subConcepts || []).map(function(sub) {
            return '<li>' + (sub.status === 'done' ? '✅' : '⬜') + ' <strong>' + (sub.name && sub.name.zh || sub.id) + '</strong>：' + (sub.description || '—') + '</li>';
          }).join('');
          return '<div class="node-card ' + s + '" style="margin-bottom:1rem;">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">' +
            '<h3>' + icon + ' ' + (m.name && m.name.zh || m.id) + '</h3>' +
            '<span class="status ' + s + '">' + (s === 'done' ? '✅ 已完成' : '🚧 施工中') + '</span></div>' +
            '<p style="font-size:0.9rem;color:var(--text-light);margin-bottom:0.5rem;">' + (m.description || '') + '</p>' +
            '<p style="font-size:0.8rem;color:var(--text-light);margin-bottom:0.5rem;">子項目：' + subDone + '/' + subTotal + '</p>' +
            (subs ? '<details style="margin-top:0.5rem;"><summary style="cursor:pointer;font-size:0.85rem;">實作細節</summary><ul style="margin-top:0.5rem;padding-left:1.25rem;">' + subs + '</ul></details>' : '') +
            '</div>';
        }).join('');
    });
  </script>
</body>
</html>
