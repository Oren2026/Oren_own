<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更新內容 | TB3 2026</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header class="header" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
    <h1>🆕 TB3 2026 更新記錄</h1>
    <p class="subtitle">所有異動歷史</p>
    <a href="../index.html" class="back-link" style="display:inline-block;margin-top:1rem;color:white;opacity:0.85;">← 返回儀表板</a>
  </header>

  <main class="container">
    <div class="section">
      <div class="section-header">
        <span class="icon">🆕</span>
        <h2>更新歷史</h2>
      </div>
      <div class="section-content">
        <div id="update-list">
          <!-- JS renders here -->
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>TB3 2026 FIRA AutoRace | 由 <a href="https://github.com/Oren2026" style="color:var(--primary);">Oren</a> 維護</p>
  </footer>

  <script>
    async function loadUpdates() {
      try {
        const res = await fetch('../updates/updates.json');
        const data = await res.json();
        const list = document.getElementById('update-list');
        if (!data || !data.length) {
          list.innerHTML = '<p style="color:var(--text-light);padding:1rem;">暫無更新記錄</p>';
          return;
        }
        list.innerHTML = data
          .sort((a, b) => b.id.localeCompare(a.id))
          .map(entry => `
            <div class="update-entry">
              <div class="update-header">
                <h2>${entry.title}</h2>
                <span class="update-date">${entry.date}</span>
              </div>
              <div class="update-body">
                <p class="tag ${entry.category==='硬體更新'?'hw':'sys'}">${entry.category}</p>
                <p>${entry.summary}</p>
              </div>
            </div>
          `).join('');
      } catch(e) {
        console.error(e);
        document.getElementById('update-list').innerHTML =
          '<p style="color:var(--danger);padding:1rem;">載入失敗</p>';
      }
    }
    loadUpdates();
  </script>
</body>
</html>
