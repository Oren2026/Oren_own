<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TB3 指令手冊 — FIRA AutoRace</title>
  <style>
    :root {
      --bg: #06080f;
      --surface: rgba(255,255,255,0.03);
      --surface-hover: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.07);
      --text: #dcdad4;
      --muted: #5a6478;
      --accent: #7fb3ff;
      --accent-dim: rgba(127,179,255,0.1);
      --accent2: #22d3ee;
      --hiwin: #7fffff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background:var(--muted); border-radius:2px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang TC","Microsoft JhengHei",-apple-system,sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.3);
      border-right: 1px solid var(--border);
      padding: 56px 0 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-title { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); padding: 0 16px 10px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .nav-item {
      display: block;
      padding: 10px 16px;
      font-size: 0.98rem;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border-left: 2px solid transparent;
    }
    .nav-item:hover { background: var(--surface); color: var(--text); }
    .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .nav-item .nav-count { font-size: 0.84rem; color: var(--muted); float: right; }

    /* ── Main ── */
    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }

    /* ── Header ── */
    .main-header {
      padding: 48px 28px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 5;
    }
    .main-header .back { display: block; margin-bottom: 12px; }
    .main-header .back a { font-size: 0.9rem; color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: color 0.2s; }
    .main-header .back a:hover { color: var(--text); }
    .main-header h1 { font-size: 1.68rem; font-weight: 700; letter-spacing: -0.02em; color: var(--accent); margin-bottom: 4px; }
    .main-header p { font-size: 0.94rem; color: var(--muted); }

    /* ── Search ── */
    .search-wrap { padding: 16px 28px; border-bottom: 1px solid var(--border); }
    .search-box { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; }
    .search-box:focus-within { border-color: rgba(127,179,255,0.3); }
    .search-icon { color: var(--muted); font-size: 1rem; flex-shrink: 0; }
    .search-input { background: none; border: none; outline: none; color: var(--text); font-size: 1.05rem; width: 100%; font-family: inherit; }
    .search-input::placeholder { color: var(--muted); }
    .search-clear { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0; display: none; }
    .search-clear.show { display: block; }
    .search-count { font-size: 0.86rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

    /* ── Content ── */
    .content { padding: 20px 28px 60px; overflow-y: auto; }

    /* ── Section ── */
    .cmd-section { margin-bottom: 36px; }
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .section-icon { font-size: 1.2rem; }
    .section-title { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    .section-count { font-size: 0.86rem; color: var(--muted); }
    .section-desc { font-size: 0.94rem; color: var(--muted); margin-bottom: 10px; line-height: 1.6; }

    /* ── Command list ── */
    .cmd-list { display: flex; flex-direction: column; gap: 6px; }
    .cmd-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      transition: border-color 0.15s;
    }
    .cmd-item:hover { border-color: rgba(127,179,255,0.2); }
    .cmd-item.hidden { display: none; }
    .cmd-body { min-width: 0; }
    .cmd-name { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .cmd-code {
      font-family: "Courier New", Consolas, monospace;
      font-size: 0.94rem;
      color: var(--accent2);
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 5px;
      padding: 7px 12px;
      margin-bottom: 5px;
      word-break: break-all;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .cmd-copy-wrap { display: flex; align-items: flex-start; padding-top: 2px; }
    .cmd-copy {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 5px;
      font-size: 0.86rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .cmd-copy:hover { background: var(--accent-dim); color: var(--accent); border-color: rgba(127,179,255,0.3); }
    .cmd-copy.copied { background: rgba(127,255,255,0.1); color: var(--hiwin); border-color: rgba(127,255,255,0.3); }
    .cmd-note { font-size: 0.86rem; color: var(--muted); margin-top: 4px; font-style: italic; }

    /* ── Dev order steps ── */
    .step-list { display: flex; flex-direction: column; gap: 8px; }
    .step-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; display: grid; grid-template-columns: 40px 1fr; gap: 14px; align-items: start; transition: border-color 0.2s; }
    .step-item:hover { border-color: rgba(127,179,255,0.2); }
    .step-num { font-size: 1.2rem; font-weight: 900; color: var(--accent); text-align: center; line-height: 1.5; }
    .step-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 5px; }
    .step-focus { font-size: 0.9rem; color: var(--accent2); margin-bottom: 7px; }
    .step-cmds { display: flex; flex-wrap: wrap; gap: 6px; }
    .step-cmd { font-size: 0.84rem; padding: 3px 10px; border-radius: 4px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07); color: var(--muted); }
    .step-output { font-size: 0.86rem; color: var(--muted); margin-top: 5px; font-style: italic; }

    /* ── Empty state ── */
    .empty-search { text-align: center; padding: 48px; color: var(--muted); font-size: 1rem; }
    .empty-search strong { color: var(--accent); }
    .load-error { text-align: center; padding: 48px; color: #ff7f7f; font-size: 1rem; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface);
      border: 1px solid rgba(127,255,255,0.3);
      color: var(--hiwin);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.98rem;
      transition: transform 0.3s ease;
      z-index: 100;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Footer ── */
    footer { padding: 16px 28px; border-top: 1px solid var(--border); font-size: 0.86rem; color: var(--muted); text-align: center; }

    @media (max-width: 700px) {
      body { flex-direction: column; }
      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 0;
      }
      .sidebar-title { display: none; }
      .nav-list-wrap { display: flex; flex-wrap: wrap; gap: 0; padding: 8px 12px; }
      .nav-item {
        display: inline-block;
        padding: 6px 10px;
        border-left: none;
        border-bottom: 2px solid transparent;
        font-size: 0.88rem;
      }
      .nav-item.active { border-bottom-color: var(--accent); background: none; }
      .nav-item .nav-count { display: none; }
      .main-header {
        padding: 16px 16px 14px;
      }
      .main-header .back { margin-bottom: 8px; }
      .search-wrap { padding: 12px 16px; }
      .content { padding: 16px 16px 60px; }
    }
  </style>
</head>
<body>

<!-- Sidebar navigation -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-title">指令分類</div>
  <div class="nav-list-wrap" id="navList"></div>
</nav>

<!-- Main content -->
<div class="main">
  <div class="main-header">
    <div class="back"><a href="../">← 月曆</a></div>
    <h1>TB3 指令手冊</h1>
    <p id="pageDesc">從 tb3-commands.json 載入</p>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="searchInput" placeholder="搜尋指令、關鍵字..." oninput="onSearch(this.value)">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
      <span class="search-count" id="searchCount"></span>
    </div>
  </div>

  <div class="content" id="content"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast">已複製到剪貼簿</div>

<script>
// ── State ──
let cmdData = {};
let currentSection = null;
let searchQuery = '';

// ── Category metadata ──
const CATEGORIES = [
  { key: 'environment',      icon: '⚙',  label: '環境建置' },
  { key: 'rosCore',          icon: '🔥', label: 'ROS 核心' },
  { key: '研習1_道路駕駛',   icon: '🚦', label: '研習1：道路駕駛' },
  { key: '研習2_自動避障',   icon: '🚧', label: '研習2：自動避障' },
  { key: '研習3_SLAM導航',   icon: '🗺️', label: '研習3：SLAM導航' },
  { key: '常用工具',          icon: '🔧', label: '常用工具' },
  { key: 'launchFiles',       icon: '📄', label: 'Launch 檔案' },
  { key: 'topics',            icon: '📡', label: 'Topic 對照' },
  { key: 'quickReference',    icon: '⚡', label: '快速參考' },
];

// ── Load JSON ──
async function loadData() {
  try {
    const res = await fetch('../data/tb3-commands.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    cmdData = await res.json();
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="load-error">載入失敗：${e.message}<br><br>請透過 HTTP 伺服器開啟本頁（不要直接雙擊檔案）</div>`;
    return;
  }

  buildNav();
  const rawHash = location.hash ? location.hash.slice(1) : '';
  const decoded = rawHash ? decodeURIComponent(rawHash) : '';
  const matched = CATEGORIES.find(c => c.key === decoded);
  showSection(matched ? decoded : CATEGORIES[0].key);
}

// ── Build nav ──
function buildNav() {
  const nav = document.getElementById('navList');
  nav.innerHTML = CATEGORIES.map(c => {
    const section = cmdData[c.key];
    let count = 0;
    if (section) {
      if (Array.isArray(section.commands)) count = section.commands.length;
      else if (Array.isArray(section.files)) count = section.files.length;
      else if (Array.isArray(section.subscribers) && Array.isArray(section.publishers)) {
        count = section.subscribers.length + section.publishers.length;
      }
    }
    return `<div class="nav-item" data-section="${c.key}" onclick="showSection('${c.key}')">
      ${c.icon} ${c.label} <span class="nav-count">${count}</span>
    </div>`;
  }).join('');

  document.getElementById('pageDesc').textContent = cmdData.description || '';
}

// ── Show section ──
function showSection(id) {
  currentSection = id;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  document.getElementById('searchCount').textContent = '';
  location.hash = encodeURIComponent(id);

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('data-section') === id);
  });

  const content = document.getElementById('content');
  const cat = CATEGORIES.find(c => c.key === id);
  const d = cmdData[id];

  if (!d) {
    content.innerHTML = '<div class="empty-search">找不到這個分類</div>';
    return;
  }

  if (id === 'launchFiles' && Array.isArray(d.files)) {
    renderLaunchFiles(content, d, cat.icon);
    return;
  }

  if (id === 'topics') {
    renderTopics(content, d, cat.icon);
    return;
  }

  if (id === 'quickReference' && Array.isArray(d.workflows)) {
    renderQuickRef(content, d, cat.icon);
    return;
  }

  const items = d.commands || [];
  if (items.length === 0) {
    content.innerHTML = '<div class="empty-search">這個分類還沒有指令</div>';
    return;
  }

  content.innerHTML = `
    <div class="cmd-section">
      <div class="section-header">
        <span class="section-icon">${cat.icon}</span>
        <span class="section-title">${d.title || cat.label}</span>
        <span class="section-count">${items.length} 指令</span>
      </div>
      ${d.description ? `<p class="section-desc">${d.description}</p>` : ''}
      ${d.source ? `<p class="section-desc" style="color:var(--accent2)">來源：${d.source}</p>` : ''}
      <div class="cmd-list" id="cmdList">
        ${items.map((item, i) => buildCmdItem(item)).join('')}
      </div>
    </div>`;
}

function buildCmdItem(item) {
  const searchText = `${item.cmd || ''} ${item.desc || ''} ${item.category || ''}`.toLowerCase();
  return `<div class="cmd-item" data-search="${escHtml(searchText)}">
    <div class="cmd-body">
      ${item.category ? `<div class="cmd-name" style="color:var(--accent2);font-size:0.9rem;margin-bottom:4px;">【${escHtml(item.category)}】</div>` : ''}
      ${item.desc ? `<div class="cmd-name">${escHtml(item.desc)}</div>` : ''}
      ${item.cmd ? `<div class="cmd-code">${escHtml(item.cmd)}</div>` : ''}
      ${item.note ? `<div class="cmd-note">📌 ${escHtml(item.note)}</div>` : ''}
    </div>
    <div class="cmd-copy-wrap">
      ${item.cmd ? `<button class="cmd-copy" onclick="copyCmd(this, '${escHtml(item.cmd || '')}')">複製</button>` : ''}
    </div>
  </div>`;
}

function renderLaunchFiles(container, d, icon) {
  const files = d.files || [];
  container.innerHTML = `
    <div class="cmd-section">
      <div class="section-header">
        <span class="section-icon">${icon}</span>
        <span class="section-title">${d.title}</span>
        <span class="section-count">${files.length} 檔案</span>
      </div>
      <p class="section-desc">${d.description || ''}</p>
      <div class="cmd-list">
        ${files.map(f => `
        <div class="cmd-item" data-search="${escHtml((f.name||'')+' '+(f.desc||''))}">
          <div class="cmd-body">
            <div class="cmd-name">${escHtml(f.name)}</div>
            <div class="cmd-code">${escHtml(f.package)}</div>
            ${f.desc ? `<div class="cmd-note">${escHtml(f.desc)}</div>` : ''}
          </div>
        </div>`).join('')}
      </div>
    </div>`;
}

function renderTopics(container, d, icon) {
  const subs = d.subscribers || [];
  const pubs = d.publishers || [];
  container.innerHTML = `
    <div class="cmd-section">
      <div class="section-header">
        <span class="section-icon">${icon}</span>
        <span class="section-title">${d.title}</span>
        <span class="section-count">${subs.length + pubs.length} Topic</span>
      </div>
      <p class="section-desc">${d.description || ''}</p>
      ${subs.length ? `
      <div style="margin-bottom:20px;">
        <div style="font-size:0.96rem;color:var(--accent);margin-bottom:8px;">📥 訂閱（Subscribers）</div>
        <div class="cmd-list">
          ${subs.map(t => `<div class="cmd-item" data-search="${escHtml((t.name||'')+' '+(t.desc||''))}">
            <div class="cmd-body">
              <div class="cmd-code" style="color:var(--accent2)">${escHtml(t.name)}</div>
              <div style="font-size:0.86rem;color:var(--muted);margin-bottom:4px;">Type: ${escHtml(t.type)}</div>
              ${t.desc ? `<div class="cmd-note">${escHtml(t.desc)}</div>` : ''}
            </div>
          </div>`).join('')}
        </div>
      </div>` : ''}
      ${pubs.length ? `
      <div>
        <div style="font-size:0.96rem;color:var(--accent2);margin-bottom:8px;">📤 發布（Publishers）</div>
        <div class="cmd-list">
          ${pubs.map(t => `<div class="cmd-item" data-search="${escHtml((t.name||'')+' '+(t.desc||''))}">
            <div class="cmd-body">
              <div class="cmd-code" style="color:var(--hiwin)">${escHtml(t.name)}</div>
              <div style="font-size:0.86rem;color:var(--muted);margin-bottom:4px;">Type: ${escHtml(t.type)}</div>
              ${t.desc ? `<div class="cmd-note">${escHtml(t.desc)}</div>` : ''}
            </div>
          </div>`).join('')}
        </div>
      </div>` : ''}
    </div>`;
}

function renderQuickRef(container, d, icon) {
  const workflows = d.workflows || [];
  container.innerHTML = `
    <div class="cmd-section">
      <div class="section-header">
        <span class="section-icon">${icon}</span>
        <span class="section-title">${d.title}</span>
        <span class="section-count">${workflows.length} 工作流</span>
      </div>
      <p class="section-desc">${d.description || ''}</p>
      <div class="step-list">
        ${workflows.map(w => `
        <div class="step-item">
          <div class="step-num">✓</div>
          <div>
            <div class="step-title">${escHtml(w.title || '')}</div>
            ${Array.isArray(w.steps) ? `<div class="step-cmds">${w.steps.map(s => `<span class="step-cmd">${escHtml(s)}</span>`).join('')}</div>` : ''}
          </div>
        </div>`).join('')}
      </div>
    </div>`;
}

// ── Search ──
function onSearch(q) {
  searchQuery = q.toLowerCase().trim();
  const clear = document.getElementById('searchClear');
  clear.classList.toggle('show', searchQuery.length > 0);

  if (!currentSection) return;

  const items = document.querySelectorAll('.cmd-item');
  let visible = 0;
  items.forEach(item => {
    const text = item.getAttribute('data-search') || '';
    const match = text.includes(searchQuery);
    item.classList.toggle('hidden', !match);
    if (match) visible++;
  });

  const total = items.length;
  document.getElementById('searchCount').textContent = searchQuery ? `${visible}/${total}` : '';
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  onSearch('');
}

// ── Copy ──
function copyCmd(btn, cmd) {
  navigator.clipboard.writeText(cmd).then(() => {
    btn.classList.add('copied');
    btn.textContent = '✓';
    showToast('已複製：' + cmd.slice(0, 40) + (cmd.length > 40 ? '…' : ''));
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = '複製';
    }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = cmd;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓';
    setTimeout(() => { btn.textContent = '複製'; }, 2000);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Helpers ──
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──
document.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
