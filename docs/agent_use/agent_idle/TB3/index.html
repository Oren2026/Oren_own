<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TB3 2026 — FIRA AutoRace</title>
  <style>
    :root { --bg:#060c10; --surface:rgba(255,255,255,0.03); --surface-hover:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.07); --text:#e8e4de; --muted:#5a6478; --accent:#7fb3ff; --accent-dim:rgba(127,179,255,0.12); --accent2:#22d3ee; }
    * { margin:0; padding:0; box-sizing:border-box; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:var(--muted); border-radius:2px; }
    body { background:var(--bg); color:var(--text); font-family:"PingFang TC","Microsoft JhengHei",-apple-system,sans-serif; min-height:100vh; }

    /* ── Back ── */
    .back { padding: 20px 24px 0; }
    .back a { font-size: 0.78rem; color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: color 0.2s; }
    .back a:hover { color: var(--text); }

    /* ── Hero ── */
    .hero { padding: 32px 24px 40px; position: relative; overflow: hidden; }
    .hero::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse 70% 50% at 70% 0%, rgba(127,179,255,0.07) 0%, transparent 60%); pointer-events:none; }
    .hero-eyebrow { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .hero-title { font-size: clamp(1.6rem, 5vw, 2.6rem); font-weight: 800; letter-spacing: -0.03em; color: var(--accent); margin-bottom: 6px; }
    .hero-sub { font-size: 0.85rem; color: var(--muted); line-height: 1.65; margin-bottom: 24px; max-width: 480px; }

    /* ── Countdown strip ── */
    .countdown-strip { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
    .cd-box { background: var(--accent-dim); border: 1px solid rgba(127,179,255,0.2); border-radius: 8px; padding: 10px 16px; min-width: 100px; text-align: center; }
    .cd-num { font-size: 1.8rem; font-weight: 900; color: var(--accent); letter-spacing: -0.04em; line-height: 1; margin-bottom: 3px; }
    .cd-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }

    /* ── Stats row ── */
    .stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; min-width: 80px; text-align: center; }
    .stat-num { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.04em; color: var(--accent); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

    /* ── Content ── */
    .content { max-width: 820px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Section ── */
    .section { margin-bottom: 44px; }
    .section-title { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid rgba(127,179,255,0.15); }

    /* ── Study modules ── */
    .module-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .module-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .module-num { font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent2); margin-bottom: 8px; }
    .module-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 6px; }
    .module-focus { font-size: 0.75rem; color: var(--muted); line-height: 1.55; }

    /* ── Mission cards ── */
    .mission-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .mission-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; transition: border-color 0.2s, transform 0.2s; }
    .mission-card:hover { border-color: rgba(127,179,255,0.25); transform: translateY(-2px); }
    .miss-num { font-size: 1.4rem; font-weight: 900; color: var(--accent); opacity: 0.5; min-width: 24px; line-height: 1; }
    .miss-body {}
    .miss-name { font-size: 0.88rem; font-weight: 600; margin-bottom: 2px; }
    .miss-study { font-size: 0.7rem; color: var(--accent2); }

    /* ── Dev steps ── */
    .step-list { display: flex; flex-direction: column; gap: 8px; }
    .step-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; display: grid; grid-template-columns: 36px 1fr; gap: 12px; align-items: start; transition: border-color 0.2s; }
    .step-item:hover { border-color: rgba(127,179,255,0.2); }
    .step-num { font-size: 1rem; font-weight: 900; color: var(--accent); text-align: center; line-height: 1.6; }
    .step-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 4px; }
    .step-focus { font-size: 0.75rem; color: var(--accent2); margin-bottom: 6px; }
    .step-cmds { display: flex; flex-wrap: wrap; gap: 5px; }
    .step-cmd { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07); color: var(--muted); }
    .step-output { font-size: 0.72rem; color: var(--muted); margin-top: 4px; font-style: italic; }

    /* ── Today action ── */
    .today-panel { background: rgba(34,211,238,0.06); border: 1px solid rgba(34,211,238,0.2); border-radius: 10px; padding: 20px; }
    .today-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--accent2); margin-bottom: 10px; }
    .today-title { font-size: 0.92rem; font-weight: 700; margin-bottom: 6px; }
    .today-commands { display: flex; flex-direction: column; gap: 6px; }
    .today-cmd { font-size: 0.8rem; color: var(--muted); padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .today-cmd::before { content:'→ '; color: var(--accent2); }

    /* ── Skills ── */
    .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .skill-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; transition: border-color 0.2s; }
    .skill-chip:hover { border-color: rgba(127,179,255,0.25); }
    .chip-icon { font-size: 1rem; }
    .chip-name { font-size: 0.8rem; font-weight: 600; flex: 1; }
    .chip-w { font-size: 0.7rem; color: var(--muted); }

    /* ── Footer ── */
    footer { text-align: center; padding: 24px; font-size: 0.72rem; color: var(--muted); border-top: 1px solid var(--border); }

    @media (max-width: 600px) { .module-grid { grid-template-columns: 1fr; } .step-item { grid-template-columns: 28px 1fr; } }
  </style>
</head>
<body>

<div class="back"><a href="../">← 賽程日曆</a></div>

<div class="hero">
  <div class="hero-eyebrow">FIRA AutoRace · TurtleBot 3</div>
  <h1 class="hero-title">TB3 自動駕駛</h1>
  <p class="hero-sub">ROS + Python + OpenCV。7項 Mission，從研習1到研習3的開發順序。</p>

  <div class="countdown-strip">
    <div class="cd-box">
      <div class="cd-num" id="cdRace">—</div>
      <div class="cd-label">FIRA 倒數</div>
    </div>
    <div class="cd-box">
      <div class="cd-num" id="cdVideo">56</div>
      <div class="cd-label">上銀複審</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box"><div class="stat-num">7</div><div class="stat-label">Mission</div></div>
    <div class="stat-box"><div class="stat-num">13</div><div class="stat-label">核心技能</div></div>
    <div class="stat-box"><div class="stat-num">3</div><div class="stat-label">研習模組</div></div>
    <div class="stat-box"><a href="commands.html" class="stat-box stat-link" style="text-decoration:none"><div class="stat-num" style="color:var(--accent2)">📋</div><div class="stat-label">指令手冊</div></a></div>
  </div>
</div>

<div class="content">

  <!-- Today action -->
  <div class="section">
    <div class="section-title">今日行動 <a href="commands.html" style="float:right;font-size:0.7rem;color:var(--accent2);font-weight:400;text-decoration:none;letter-spacing:0">📋 指令手冊 →</a></div>
    <div class="today-panel" id="todayPanel">
      <div class="today-label">Priority</div>
      <div class="today-title" id="todayTitle">環境建置 + 號誌偵測</div>
      <div class="today-commands" id="todayCmds"></div>
    </div>
  </div>

  <!-- Study modules -->
  <div class="section">
    <div class="section-title">研習模組</div>
    <div class="module-grid" id="moduleGrid"></div>
  </div>

  <!-- Development steps -->
  <div class="section">
    <div class="section-title">開發順序</div>
    <div class="step-list" id="stepList"></div>
  </div>

  <!-- Missions -->
  <div class="section">
    <div class="section-title">7項 Mission</div>
    <div class="mission-grid" id="missionGrid"></div>
  </div>

  <!-- Skills -->
  <div class="section">
    <div class="section-title">核心技能</div>
    <div class="skill-grid" id="skillGrid"></div>
  </div>

</div>

<footer>TB3 2026 · 黑皮團隊 · 資料動態讀取 agent_idle/data/tb3.json</footer>

<script>
async function load() {
  try {
    const res = await fetch('../data/tb3.json');
    const d = await res.json();

    // Countdown
    const race = new Date('2026-04-25');
    const now = new Date();
    const diff = Math.round((race - now) / 86400000);
    document.getElementById('cdRace').textContent = diff > 0 ? diff : '0';

    // Today action
    const ta = d.todayAction || {};
    document.getElementById('todayTitle').textContent = ta.focus || '';
    document.getElementById('todayCmds').innerHTML = (ta.commands||[]).map(c => `<div class="today-cmd">${c}</div>`).join('');

    // Study modules
    const mg = document.getElementById('moduleGrid');
    const sm = d.studyModules || {};
    mg.innerHTML = Object.entries(sm).map(([k, v]) => `
      <div class="module-card">
        <div class="module-num">${k}</div>
        <div class="module-name">${v.name||k}</div>
        <div class="module-focus">${v.focus||''}</div>
      </div>`).join('');

    // Dev steps
    const sl = document.getElementById('stepList');
    const steps = (d.missionSequence||{}).steps || [];
    sl.innerHTML = steps.map(s => `
      <div class="step-item">
        <div class="step-num">${s.step}</div>
        <div>
          <div class="step-title">${s.title}</div>
          <div class="step-focus">${s.focus||''}</div>
          <div class="step-cmds">${(s.commands||[]).map(c=>`<span class="step-cmd">${c}</span>`).join('')}</div>
          ${s.output ? `<div class="step-output">→ ${s.output}</div>` : ''}
        </div>
      </div>`).join('');

    // Missions
    const missions = d.missions || {};
    const mapping = missions.mapping || {};
    const missArr = Object.entries(mapping).map(([k,v]) => ({...v, num:k})).sort((a,b)=>parseInt(a.num)-parseInt(b.num));
    const mg2 = document.getElementById('missionGrid');
    mg2.innerHTML = missArr.map(m => `
      <div class="mission-card">
        <div class="miss-num">${m.num}</div>
        <div class="miss-body">
          <div class="miss-name">${m.name}</div>
          <div class="miss-study">${m.研習||''}</div>
        </div>
      </div>`).join('');

    // Skills
    const sg = document.getElementById('skillGrid');
    sg.innerHTML = (d.skills||[]).map(s => `
      <div class="skill-chip">
        <div class="chip-icon">◉</div>
        <div class="chip-name">${s.name}</div>
        <div class="chip-w">${s.weeks}w</div>
      </div>`).join('');

  } catch(e) {
    document.querySelector('.content').innerHTML += `<div style="color:#7fb3ff;padding:40px">載入失敗：${e.message}</div>`;
  }
}
document.addEventListener('DOMContentLoaded', load);
</script>

</body>
</html>
