<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TB3 2026 — FIRA AutoRace</title>
  <style>
    :root { --bg:#060c10; --surface:rgba(255,255,255,0.03); --surface-hover:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.07); --text:#e8e4de; --muted:#5a6478; --accent:#7fb3ff; --accent-dim:rgba(127,179,255,0.12); --accent2:#22d3ee; --hiwin:#7fffff; }
    * { margin:0; padding:0; box-sizing:border-box; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:var(--muted); border-radius:2px; }
    body { background:var(--bg); color:var(--text); font-family:"PingFang TC","Microsoft JhengHei",-apple-system,sans-serif; min-height:100vh; }

    /* ── Back ── */
    .back { padding: 20px 24px 0; }
    .back a { font-size: 0.94rem; color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: color 0.2s; }
    .back a:hover { color: var(--text); }

    /* ── Hero ── */
    .hero {
      padding: 48px 24px 48px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    .hero::before {
      content:'';
      position:absolute;
      inset:0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(127,179,255,0.08) 0%, transparent 60%),
        url('https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Turtlebot3_burger.png/640px-Turtlebot3_burger.png') center right / 380px auto no-repeat;
      pointer-events:none;
      opacity: 0.25;
    }
    .hero-eyebrow { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; position: relative; }
    .hero-title { font-size: clamp(2rem, 6vw, 3rem); font-weight: 800; letter-spacing: -0.03em; color: var(--accent); margin-bottom: 10px; position: relative; }
    .hero-sub { font-size: 1.05rem; color: var(--muted); line-height: 1.65; margin-bottom: 28px; max-width: 520px; margin-left: auto; margin-right: auto; position: relative; }

    /* ── Countdown strip ── */
    .countdown-strip { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; position: relative; }
    .cd-box { background: var(--accent-dim); border: 1px solid rgba(127,179,255,0.2); border-radius: 8px; padding: 12px 20px; min-width: 110px; text-align: center; }
    .cd-num { font-size: 2.1rem; font-weight: 900; color: var(--accent); letter-spacing: -0.04em; line-height: 1; margin-bottom: 4px; }
    .cd-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }

    /* ── Stats row ── */
    .stats { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; position: relative; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 120px; transition: border-color 0.2s, background 0.2s; }
    a.stat-box { text-decoration: none; }
    a.stat-box:hover { background: var(--surface-hover); border-color: rgba(127,179,255,0.3); }
    .stat-num { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.04em; color: var(--accent); line-height: 1; margin-bottom: 5px; }
    .stat-num.cyan { color: var(--accent2); }
    .stat-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

    /* ── Content ── */
    .content { max-width: 820px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Section ── */
    .section { margin-bottom: 48px; }
    .section-title { font-size: 0.86rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(127,179,255,0.15); display: flex; align-items: center; justify-content: space-between; }
    .section-title a { font-size: 0.84rem; color: var(--accent2); font-weight: 400; text-decoration: none; letter-spacing: 0; }
    .section-title a:hover { text-decoration: underline; }

    /* ── Study modules ── */
    .module-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .module-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; transition: border-color 0.2s; }
    .module-card:hover { border-color: rgba(127,179,255,0.2); }
    .module-num { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent2); margin-bottom: 10px; }
    .module-name { font-size: 1.08rem; font-weight: 700; margin-bottom: 7px; }
    .module-focus { font-size: 0.9rem; color: var(--muted); line-height: 1.55; }

    /* ── Mission cards ── */
    .mission-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .mission-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; transition: border-color 0.2s, transform 0.2s; }
    .mission-card:hover { border-color: rgba(127,179,255,0.25); transform: translateY(-2px); }
    .miss-num { font-size: 1.6rem; font-weight: 900; color: var(--accent); opacity: 0.4; min-width: 28px; line-height: 1; }
    .miss-body {}
    .miss-name { font-size: 1.05rem; font-weight: 600; margin-bottom: 3px; }
    .miss-study { font-size: 0.84rem; color: var(--accent2); }

    /* ── Dev steps ── */
    .step-list { display: flex; flex-direction: column; gap: 10px; }
    .step-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; display: grid; grid-template-columns: 42px 1fr; gap: 14px; align-items: start; transition: border-color 0.2s; }
    .step-item:hover { border-color: rgba(127,179,255,0.2); }
    .step-num { font-size: 1.2rem; font-weight: 900; color: var(--accent); text-align: center; line-height: 1.5; }
    .step-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 5px; }
    .step-focus { font-size: 0.9rem; color: var(--accent2); margin-bottom: 7px; }
    .step-cmds { display: flex; flex-wrap: wrap; gap: 6px; }
    .step-cmd { font-size: 0.84rem; padding: 3px 10px; border-radius: 4px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07); color: var(--muted); }
    .step-output { font-size: 0.86rem; color: var(--muted); margin-top: 5px; font-style: italic; }

    /* ── Today action ── */
    .today-panel { background: rgba(34,211,238,0.06); border: 1px solid rgba(34,211,238,0.2); border-radius: 10px; padding: 20px 22px; }
    .today-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--accent2); margin-bottom: 10px; }
    .today-title { font-size: 1.14rem; font-weight: 700; margin-bottom: 12px; }
    .today-commands { display: flex; flex-direction: column; gap: 6px; }
    .today-cmd { font-size: 0.96rem; color: var(--muted); padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .today-cmd::before { content:'→ '; color: var(--accent2); }
    .today-cmd:last-child { border-bottom: none; }

    /* ── Skills ── */
    .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .skill-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 10px; transition: border-color 0.2s; }
    .skill-chip:hover { border-color: rgba(127,179,255,0.25); }
    .chip-icon { font-size: 1.1rem; }
    .chip-name { font-size: 0.96rem; font-weight: 600; flex: 1; }
    .chip-w { font-size: 0.84rem; color: var(--muted); }

    /* ── Footer ── */
    footer { text-align: center; padding: 28px; font-size: 0.86rem; color: var(--muted); border-top: 1px solid var(--border); }

    @media (max-width: 600px) {
      .hero { padding: 32px 16px 36px; }
      .hero::before { background: none; }
      .back { padding: 16px 16px 0; }
      .module-grid { grid-template-columns: 1fr; }
      .stats { flex-wrap: wrap; }
      .stat-box { min-width: calc(50% - 6px); }
      .step-item { grid-template-columns: 32px 1fr; padding: 14px 16px; }
      .content { padding: 0 16px 60px; }
    }
  </style>
</head>
<body>

<div class="back"><a href="../">← 月曆</a></div>

<div class="hero">
  <div class="hero-eyebrow">FIRA AutoRace · TurtleBot 3</div>
  <h1 class="hero-title">TB3 自動駕駛</h1>
  <p class="hero-sub">ROS + Python + OpenCV。7項 Mission，從研習1到研習3的開發順序。</p>

  <div class="countdown-strip">
    <div class="cd-box">
      <div class="cd-num" id="cdRace">—</div>
      <div class="cd-label">FIRA 倒數</div>
    </div>
    <div class="cd-box">
      <div class="cd-num" id="cdVideo">56</div>
      <div class="cd-label">上銀複審</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box"><div class="stat-num">7</div><div class="stat-label">Mission</div></div>
    <div class="stat-box"><div class="stat-num">13</div><div class="stat-label">核心技能</div></div>
    <div class="stat-box"><div class="stat-num">3</div><div class="stat-label">研習模組</div></div>
    <a href="commands.html" class="stat-box"><div class="stat-num cyan">◈</div><div class="stat-label">指令手冊</div></a>
  </div>
</div>

<div class="content">

  <!-- Today action -->
  <div class="section">
    <div class="section-title">
      <span>今日行動</span>
      <a href="commands.html">📋 指令手冊 →</a>
    </div>
    <div class="today-panel" id="todayPanel">
      <div class="today-label">Priority</div>
      <div class="today-title" id="todayTitle">—</div>
      <div class="today-commands" id="todayCmds"></div>
    </div>
  </div>

  <!-- Study modules -->
  <div class="section">
    <div class="section-title">研習模組</div>
    <div class="module-grid" id="moduleGrid"></div>
  </div>

  <!-- Development steps -->
  <div class="section">
    <div class="section-title">開發順序</div>
    <div class="step-list" id="stepList"></div>
  </div>

  <!-- Missions -->
  <div class="section">
    <div class="section-title">7項 Mission</div>
    <div class="mission-grid" id="missionGrid"></div>
  </div>

  <!-- Skills -->
  <div class="section">
    <div class="section-title">核心技能</div>
    <div class="skill-grid" id="skillGrid"></div>
  </div>

</div>

<footer>TB3 2026 · 黑皮團隊 · 資料動態讀取 agent_idle/data/tb3.json</footer>

<script>
async function load() {
  try {
    const res = await fetch('../data/tb3.json');
    const d = await res.json();

    const race = new Date('2026-04-25');
    const now = new Date();
    const diff = Math.round((race - now) / 86400000);
    document.getElementById('cdRace').textContent = diff > 0 ? diff : '0';

    const ta = d.todayAction || {};
    document.getElementById('todayTitle').textContent = ta.focus || '—';
    document.getElementById('todayCmds').innerHTML = (ta.commands||[]).map(c => `<div class="today-cmd">${escHtml(c)}</div>`).join('');

    const mg = document.getElementById('moduleGrid');
    const sm = d.studyModules || {};
    mg.innerHTML = Object.entries(sm).map(([k, v]) => `
      <div class="module-card">
        <div class="module-num">${escHtml(k)}</div>
        <div class="module-name">${escHtml(v.name||k)}</div>
        <div class="module-focus">${escHtml(v.focus||'')}</div>
      </div>`).join('');

    const sl = document.getElementById('stepList');
    const steps = (d.missionSequence||{}).steps || [];
    sl.innerHTML = steps.map(s => `
      <div class="step-item">
        <div class="step-num">${s.step}</div>
        <div>
          <div class="step-title">${escHtml(s.title||'')}</div>
          <div class="step-focus">${escHtml(s.focus||'')}</div>
          <div class="step-cmds">${(s.commands||[]).map(c=>`<span class="step-cmd">${escHtml(c)}</span>`).join('')}</div>
          ${s.output ? `<div class="step-output">→ ${escHtml(s.output)}</div>` : ''}
        </div>
      </div>`).join('');

    const missions = d.missions || {};
    const mapping = missions.mapping || {};
    const missArr = Object.entries(mapping).map(([k,v]) => ({...v, num:k})).sort((a,b)=>parseInt(a.num)-parseInt(b.num));
    const mg2 = document.getElementById('missionGrid');
    mg2.innerHTML = missArr.map(m => `
      <div class="mission-card">
        <div class="miss-num">${m.num}</div>
        <div class="miss-body">
          <div class="miss-name">${escHtml(m.name||'')}</div>
          <div class="miss-study">${escHtml(m.研習||'')}</div>
        </div>
      </div>`).join('');

    const sg = document.getElementById('skillGrid');
    sg.innerHTML = (d.skills||[]).map(s => `
      <div class="skill-chip">
        <div class="chip-icon">◉</div>
        <div class="chip-name">${escHtml(s.name||'')}</div>
        <div class="chip-w">${escHtml(s.weeks||'')}w</div>
      </div>`).join('');

  } catch(e) {
    document.querySelector('.content').innerHTML += `<div style="color:#ff7f7f;padding:40px">載入失敗：${e.message}</div>`;
  }
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('DOMContentLoaded', load);
</script>

</body>
</html>
