<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成長雷達 — 黑皮的學習路徑</title>
  <style>
    :root {
      --bg: #06060c;
      --text: #dcdad4;
      --muted: #686460;
      --tdk: #ff7f7f;
      --tb3: #7fb3ff;
      --hiwin: #7fffff;
      --accent: #b87fff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
    body { background: var(--bg); color: var(--text); font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, sans-serif; min-height: 100vh; }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 64px 24px 48px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(184,127,255,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% 50%, rgba(127,179,255,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(127,255,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .eyebrow { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .page-title {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #ff7f7f 0%, #b87fff 40%, #7fb3ff 70%, #7fffff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .page-sub { font-size: 0.85rem; color: var(--muted); line-height: 1.7; max-width: 520px; margin: 0 auto 48px; }

    /* ── 光譜追蹤條 ── */
    .spectrum-container { width: 100%; max-width: 700px; margin: 0 auto 12px; }
    .spectrum-track { position: relative; height: 6px; border-radius: 3px; background: linear-gradient(90deg, rgba(255,127,127,0.3), rgba(184,127,255,0.3), rgba(127,179,255,0.3), rgba(127,255,255,0.3)); overflow: hidden; }
    .spectrum-progress { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 3px; background: linear-gradient(90deg, #ff7f7f, #b87fff, #7fb3ff, #7fffff); transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1); width: 0%; }
    .spectrum-labels { display: flex; justify-content: space-between; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }

    /* ── Switch Bar ── */
    .switch-bar { display: flex; justify-content: center; gap: 4px; margin-bottom: 48px; padding: 0 24px; flex-wrap: wrap; }
    .switch-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); color: var(--muted); padding: 8px 20px; border-radius: 6px; font-size: 0.78rem; letter-spacing: 0.06em; cursor: pointer; transition: all 0.25s ease; font-family: inherit; }
    .switch-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .switch-btn.active[data-view="all"]  { background: rgba(184,127,255,0.15); border-color: rgba(184,127,255,0.4); color: var(--accent); }
    .switch-btn.active[data-view="tdk"] { background: rgba(255,127,127,0.12); border-color: rgba(255,127,127,0.4); color: var(--tdk); }
    .switch-btn.active[data-view="tb3"] { background: rgba(127,179,255,0.12); border-color: rgba(127,179,255,0.4); color: var(--tb3); }
    .switch-btn.active[data-view="hiwin"]{ background: rgba(127,255,255,0.12); border-color: rgba(127,255,255,0.4); color: var(--hiwin); }

    /* ── Content ── */
    .content-section { padding: 0 24px 80px; max-width: 860px; margin: 0 auto; }
    .project-view { display: none; animation: pulse-in 0.4s ease forwards; }
    .project-view.active { display: block; }
    @keyframes pulse-in { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Radar Card ── */
    .radar-card { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 32px; margin-bottom: 32px; transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .radar-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    .radar-card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.02em; }
    .radar-card > p { font-size: 0.85rem; color: var(--muted); line-height: 1.7; }

    /* ── Tags ── */
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
    .tag { font-size: 10px; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.05em; border: 1px solid; }

    /* ── Stat Row ── */
    .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 24px; }
    .stat-box { text-align: center; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 16px 12px; }
    .stat-num { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.04em; line-height: 1; margin-bottom: 6px; }
    .stat-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

    /* ── Timeline ── */
    .timeline { position: relative; margin-top: 32px; padding-left: 24px; }
    .timeline::before { content: ''; position: absolute; left: 6px; top: 4px; bottom: 4px; width: 1px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.12) 10%, rgba(255,255,255,0.12) 90%, transparent); }
    .timeline-item { position: relative; margin-bottom: 24px; opacity: 0; transform: translateY(12px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .timeline-item.visible { opacity: 1; transform: translateY(0); }
    .timeline-item::before { content: ''; position: absolute; left: -22px; top: 8px; width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid; background: var(--bg); transition: transform 0.2s ease; }
    .timeline-item:hover::before { transform: scale(1.4); }
    .tl-date  { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .tl-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
    .tl-desc  { font-size: 0.8rem; color: var(--muted); line-height: 1.6; }

    /* ── Expandable ── */
    .expand-btn { background: none; border: none; color: var(--muted); font-size: 0.75rem; cursor: pointer; padding: 4px 0; font-family: inherit; display: flex; align-items: center; gap: 4px; transition: color 0.2s; margin-top: 12px; }
    .expand-btn:hover { color: var(--text); }
    .expand-icon { transition: transform 0.25s ease; display: inline-block; }
    .expand-btn.open .expand-icon { transform: rotate(90deg); }
    .expand-content { display: none; padding: 10px 0 4px; font-size: 0.8rem; color: var(--muted); line-height: 1.7; }
    .expand-content.open { display: block; }

    /* ── Skill Grid ── */
    .radar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
    .radar-skill { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 14px; transition: border-color 0.2s, transform 0.2s; }
    .radar-skill:hover { border-color: rgba(184,127,255,0.3); transform: translateY(-2px); }
    .skill-name { font-size: 0.75rem; font-weight: 600; margin-bottom: 6px; }
    .skill-bar-bg { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .skill-bar { height: 100%; border-radius: 2px; transition: width 1s cubic-bezier(0.22, 1, 0.36, 1); width: 0%; }
    .skill-note { font-size: 9px; color: var(--muted); margin-top: 5px; letter-spacing: 0.04em; }

    /* ── Countdown ── */
    .countdown-tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; }

    /* ── Footer ── */
    .footer-note { text-align: center; padding: 40px 24px; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; border-top: 1px solid rgba(255,255,255,0.04); }

    /* ── Loading ── */
    .loading-msg { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 40px; }
    .error-msg { text-align: center; color: #ff7f7f; font-size: 0.85rem; padding: 40px; }

    /* ── System Status Panel ── */
    .sys-panel {
      display: flex;
      justify-content: center;
      gap: 1px;
      margin: 0 auto 40px;
      max-width: 700px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      overflow: hidden;
    }
    .sys-item {
      flex: 1;
      text-align: center;
      padding: 14px 12px;
      border-right: 1px solid rgba(255,255,255,0.04);
      transition: background 0.2s;
    }
    .sys-item:last-child { border-right: none; }
    .sys-item:hover { background: rgba(255,255,255,0.03); }
    .sys-value { font-size: 0.85rem; font-weight: 600; color: var(--text); letter-spacing: -0.02em; margin-bottom: 3px; }
    .sys-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .sys-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
    .sys-dot-green  { background: #7fffff; box-shadow: 0 0 6px rgba(127,255,255,0.6); }
    .sys-dot-yellow { background: #ffff7f; box-shadow: 0 0 6px rgba(255,255,127,0.6); }
    .sys-dot-purple { background: #b87fff; box-shadow: 0 0 6px rgba(184,127,255,0.6); }

    /* ── Keyboard Hint ── */
    .kbd-hint { text-align: center; font-size: 10px; color: var(--muted); margin-bottom: 40px; letter-spacing: 0.06em; }
    .kbd { display: inline-block; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 3px; padding: 1px 6px; font-size: 9px; }

    /* ── Enhanced Radar Card with #07 Flow depth ── */
    .radar-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.35s ease,
                  border-color 0.25s ease;
    }
    .radar-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 20% 0%, rgba(255,255,255,0.03) 0%, transparent 60%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .radar-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.12);
    }
    .radar-card:hover::before { opacity: 1; }

    /* ── Enhanced Timeline with #07 Flow ── */
    .timeline-item {
      position: relative;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateX(-12px);
      transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .timeline-item.visible {
      opacity: 1;
      transform: translateX(0);
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -22px;
      top: 8px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 1.5px solid;
      background: var(--bg);
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.25s ease;
    }
    .timeline-item:hover::before {
      transform: scale(1.6);
      box-shadow: 0 0 10px currentColor;
    }
    .tl-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 4px;
      transition: color 0.2s;
    }
    .timeline-item:hover .tl-title { color: var(--text); }

    /* ── Skill depth ── */
    .radar-skill {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 14px;
      transition: border-color 0.25s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.25s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.25s ease;
    }
    .radar-skill:hover {
      border-color: rgba(184,127,255,0.4);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    @media (max-width: 600px) { .radar-card { padding: 20px; } .radar-grid { grid-template-columns: repeat(2, 1fr); } .stat-row { gap: 8px; } .sys-panel { flex-wrap: wrap; } .sys-item { min-width: 50%; } }
  </style>
</head>
<body>

<div class="hero">
  <p class="eyebrow">成長雷達 · Learning Radar</p>
  <h1 class="page-title">成長雷達</h1>
  <p class="page-sub">黑皮的三條學習路徑：TDK 機器人、TB3 自動駕駛、上銀撞球手臂。<br>追蹤每條路徑的進度與關鍵技能發展。</p>

  <div class="spectrum-container">
    <div class="spectrum-track">
      <div class="spectrum-progress" id="heroProgress"></div>
    </div>
    <div class="spectrum-labels">
      <span style="color: var(--tdk)">TDK · 文蛤分級</span>
      <span style="color: var(--tb3)">TB3 · 自動駕駛</span>
      <span style="color: var(--hiwin)">上銀 · 撞球手臂</span>
    </div>
  </div>
</div>

<div class="kbd-hint">按 <span class="kbd">1</span> <span class="kbd">2</span> <span class="kbd">3</span> <span class="kbd">4</span> 快速切換視角</div>

<div class="sys-panel" id="sysPanel">
  <div class="sys-item">
    <div class="sys-value" id="sysLastUpdate">—</div>
    <div class="sys-label">上次研究</div>
  </div>
  <div class="sys-item">
    <div class="sys-value" id="sysSkills">— <span class="sys-label" style="display:inline;font-size:9px">項技能</span></div>
    <div class="sys-label">總技能數</div>
  </div>
  <div class="sys-item">
    <div class="sys-value" id="sysMilestones">— <span class="sys-label" style="display:inline;font-size:9px">項里程</span></div>
    <div class="sys-label">總里程</div>
  </div>
  <div class="sys-item">
    <div class="sys-value"><span class="sys-dot sys-dot-purple"></span><span id="sysJsonStatus">檢查中</span></div>
    <div class="sys-label">JSON 狀態</div>
  </div>
</div>

<div class="switch-bar">
  <button class="switch-btn active" data-view="all"   onclick="switchView('all')">全部一覽</button>
  <button class="switch-btn"        data-view="tdk"   onclick="switchView('tdk')">TDK 2026</button>
  <button class="switch-btn"        data-view="tb3"   onclick="switchView('tb3')">TB3 2026</button>
  <button class="switch-btn"        data-view="hiwin" onclick="switchView('hiwin')">上銀撞球</button>
</div>

<div class="content-section">
  <div class="loading-msg" id="loadingMsg">正在載入資料...</div>
  <div class="error-msg" id="errorMsg" style="display:none"></div>

  <!-- ALL VIEW -->
  <div class="project-view" id="view-all"></div>
  <!-- TDK -->
  <div class="project-view" id="view-tdk"></div>
  <!-- TB3 -->
  <div class="project-view" id="view-tb3"></div>
  <!-- HIWIN -->
  <div class="project-view" id="view-hiwin"></div>
</div>

<div class="footer-note" id="footerNote"></div>

<script>
  // ── Global state ──
  let jsonData = {};

  // ── Fetch all JSON ──
  async function loadAllData() {
    try {
      const [tdkRes, tb3Res, hiwinRes] = await Promise.all([
        fetch('data/tdk.json'),
        fetch('data/tb3.json'),
        fetch('data/hiwin.json')
      ]);
      if (!tdkRes.ok || !tb3Res.ok || !hiwinRes.ok) throw new Error('JSON 載入失敗');
      jsonData = {
        tdk:   await tdkRes.json(),
        tb3:   await tb3Res.json(),
        hiwin: await hiwinRes.json()
      };
      document.getElementById('loadingMsg').style.display = 'none';
      renderAllViews();
      switchView('all');
    } catch (e) {
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('errorMsg').textContent = '載入失敗：' + e.message + '（路徑：data/*.json）';
    }
  }

  // ── Render all three project cards ──
  function renderAllViews() {
    renderSingle('view-all', [jsonData.tdk, jsonData.tb3, jsonData.hiwin], 'all');
    renderSingle('view-tdk',  [jsonData.tdk],  'tdk');
    renderSingle('view-tb3',  [jsonData.tb3],  'tb3');
    renderSingle('view-hiwin', [jsonData.hiwin], 'hiwin');
    document.getElementById('footerNote').textContent =
      '成長雷達 · 黑皮的學習路徑追蹤  |  資料動態讀取：tdk.json · tb3.json · hiwin.json';
    buildSysPanel();
  }

  // ── System Status Panel ──
  function buildSysPanel() {
    // Last update = most recent milestone date across all projects
    const allMilestones = [
      ...(jsonData.tdk    && jsonData.tdk.milestones    || []),
      ...(jsonData.tb3    && jsonData.tb3.milestones    || []),
      ...(jsonData.hiwin  && jsonData.hiwin.milestones  || [])
    ].filter(m => m && m.date);

    // Parse dates like "2026-03-11" and "2026-03 ~ 04"
    const parsed = allMilestones
      .map(m => {
        const mDate = String(m.date).trim();
        const iso = mDate.match(/^(\d{4})-(\d{2})/);
        return iso ? new Date(iso[1], iso[2] - 1, 1) : null;
      })
      .filter(d => d && !isNaN(d));

    let lastUpdate = '—';
    if (parsed.length > 0) {
      const latest = new Date(Math.max(...parsed));
      lastUpdate = `${latest.getMonth() + 1}月${latest.getDate()}日`;
    }

    // Skill / milestone counts
    const skillCount = [
      ...(jsonData.tdk    && jsonData.tdk.skills    || []),
      ...(jsonData.tb3    && jsonData.tb3.skills     || []),
      ...(jsonData.hiwin  && jsonData.hiwin.skills   || [])
    ].length;

    const mileCount = [
      ...(jsonData.tdk    && jsonData.tdk.milestones    || []),
      ...(jsonData.tb3    && jsonData.tb3.milestones    || []),
      ...(jsonData.hiwin  && jsonData.hiwin.milestones  || [])
    ].filter(m => m && m.date).length;

    document.getElementById('sysLastUpdate').textContent = lastUpdate;
    document.getElementById('sysSkills').innerHTML = String(skillCount) + ' <span class="sys-label" style="display:inline;font-size:9px">項技能</span>';
    document.getElementById('sysMilestones').innerHTML = String(mileCount) + ' <span class="sys-label" style="display:inline;font-size:9px">項里程</span>';

    // JSON health: check if any project has content
    const hasContent = jsonData.tdk || jsonData.tb3 || jsonData.hiwin;
    const statusEl = document.getElementById('sysJsonStatus');
    if (hasContent) {
      statusEl.textContent = '正常';
      const dot = document.querySelector('.sys-dot-purple');
      if (dot) { dot.className = 'sys-dot sys-dot-green'; }
    } else {
      statusEl.textContent = '異常';
    }
  }

  // ── Render one project view (one or more cards) ──
  function renderSingle(viewId, projects, type) {
    const container = document.getElementById(viewId);
    container.innerHTML = projects.map(p => buildCard(p, type)).join('');
  }

  // ── Build one project card ──
  function buildCard(p, type) {
    const color = getColor(type);
    const tags  = buildTags(p, type);
    const stats = buildStats(p, type);
    const timeline = buildTimeline(p, type);
    const skills = buildSkills(p, type);
    const expand = buildExpand(p, type);

    return `
      <div class="radar-card" style="border-left: 3px solid ${color};">
        <h2 style="color:${color}">${escHtml(p.fullName || p.name)}</h2>
        <p>${escHtml(p.notes || '')}</p>
        ${tags}
        ${stats}
        ${timeline}
        ${expand}
        ${skills}
      </div>
    `;
  }

  // ── Tag row ──
  function buildTags(p, type) {
    const parts = [];

    if (type === 'tdk') {
      parts.push(tag('第30屆', 'tdk'));
      if (p.dates && p.dates.preliminary) parts.push(tag('預計 ' + fmtDate(p.dates.preliminary), 'soon'));
      parts.push(tag('自動組', 'active'));
    } else if (type === 'tb3') {
      parts.push(tag('ROS', 'tb3'));
      parts.push(tag('OpenCV', 'tb3'));
      parts.push(tag('施工中', 'active'));
      if (p.missions) parts.push(tag(p.missions.total + ' 項 Mission', 'soon'));
    } else if (type === 'hiwin') {
      const status = p.status === 'preliminary_passed' ? '初審通過 🎉' : p.status;
      parts.push(tag(status, 'hiwin'));
      if (p.countdown) {
        const vd = p.countdown.video;
        const fd = p.countdown.final;
        parts.push(tag(`複審倒數 ${vd} 天`, 'soon'));
        parts.push(tag(`決賽倒數 ${fd} 天`, 'active'));
      }
    }

    return `<div class="tag-row">${parts.join('')}</div>`;
  }

  // ── Stat row ──
  function buildStats(p, type) {
    const stat = (num, label, color) =>
      `<div class="stat-box"><div class="stat-num" style="color:${color}">${escHtml(num)}</div><div class="stat-label">${escHtml(label)}</div></div>`;

    if (type === 'tdk') {
      return `<div class="stat-row">
        ${stat('30', '第30屆', '#ff7f7f')}
        ${stat('Sep', '初賽預計', '#ff7f7f')}
        ${stat('3D', '文蛤列印', '#ff7f7f')}
      </div>`;
    } else if (type === 'tb3') {
      return `<div class="stat-row">
        ${stat(String(p.missions ? p.missions.total : '7'), '關卡總數', '#7fb3ff')}
        ${stat(String(p.missions ? p.missions.completed : 0), '已完成', '#7fb3ff')}
        ${stat('🚧', '施工中', '#7fb3ff')}
      </div>`;
    } else if (type === 'hiwin') {
      const vd = p.countdown ? String(p.countdown.video) : '—';
      const fd = p.countdown ? String(p.countdown.final) : '—';
      return `<div class="stat-row">
        ${stat('✅', '初審通過', '#7fffff')}
        ${stat(vd, '複審倒數天', '#7fffff')}
        ${stat(fd, '決賽倒數天', '#7fffff')}
      </div>`;
    }
    return '';
  }

  // ── Timeline ──
  function buildTimeline(p, type) {
    if (!p.milestones || !p.milestones.length) return '';
    const dotClass = type + '-dot';
    const items = p.milestones.map(m => `
      <div class="timeline-item ${dotClass}">
        <div class="tl-date">${escHtml(m.date)}</div>
        <div class="tl-title">${escHtml(m.title)}</div>
        <div class="tl-desc">${escHtml(m.desc || '')}</div>
      </div>`).join('');
    return `<div class="timeline">${items}</div>`;
  }

  // ── Expandable section ──
  function buildExpand(p, type) {
    let content = '';
    if (type === 'tdk' && p.scoring) {
      content = `<p>${escHtml(p.scoring.note || p.scoring.clarification || '')}</p>`;
    } else if (type === 'tb3') {
      content = `<p>HSV 顏色空間（號誌偵測）、霍夫圓變換（燈號確認）、透視轉換（top-down）、滑動視窗（車道線）、PID 控制（轉向）、光源補償（隧道備援）、障礙物偵測（紅色三角）。</p>`;
    } else if (type === 'hiwin' && p.prizes) {
      const ps = p.prizes;
      let lines = [];
      if (ps.champion)  lines.push(`冠軍 ${ps.champion}`);
      if (ps.second)    lines.push(`亞軍 ${ps.second}`);
      if (ps.third)     lines.push(`季軍 ${ps.third} × 2`);
      if (ps.special)   lines.push(`評審特別獎 ${ps.special}`);
      content = `<p>${lines.join(' / ')}</p>`;
    }
    if (!content) return '';
    return `
      <button class="expand-btn" onclick="toggleExpand(this)">
        <span class="expand-icon">▸</span> 更多資訊
      </button>
      <div class="expand-content">${content}</div>`;
  }

  // ── Skills grid ──
  function buildSkills(p, type) {
    if (!p.skills || !p.skills.length) return '';
    const color = getColor(type);
    const skillItems = p.skills.map(s => {
      const level = Math.round((s.weeks || 1) * 5);
      const statusMap = { high: '🔴', medium: '🟡', planning: '🔴', learning: '🟡', ready: '🟢' };
      const statusIcon = statusMap[s.priority] || '🔴';
      return `
        <div class="radar-skill">
          <div class="skill-name" style="color:${color}">${statusIcon} ${escHtml(s.name)}</div>
          <div class="skill-bar-bg">
            <div class="skill-bar" style="background:${color}" data-w="${Math.min(level,100)}"></div>
          </div>
          <div class="skill-note">${escHtml(s.note || s.priority || '')}</div>
        </div>`;
    }).join('');
    return `<div class="radar-grid">${skillItems}</div>`;
  }

  // ── Helpers ──
  function getColor(type) {
    return ({ tdk: '#ff7f7f', tb3: '#7fb3ff', hiwin: '#7fffff', all: '#b87fff' })[type] || '#b87fff';
  }

  function tag(text, type) {
    const cls = ({ tdk:'tag-tdk', tb3:'tag-tb3', hiwin:'tag-hiwin', active:'tag-active', soon:'tag-soon' })[type] || 'tag-active';
    return `<span class="tag ${cls}">${escHtml(text)}</span>`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function fmtDate(d) {
    if (!d) return '';
    return String(d).replace(/^(\d{4})-(\d{2})(?:-.*)?$/, '$2月');
  }

  // ── View switcher ──
  function switchView(view) {
    document.querySelectorAll('.project-view').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.switch-btn').forEach(btn => btn.classList.remove('active'));
    const target = document.getElementById('view-' + view);
    if (target) target.classList.add('active');
    const btn = document.querySelector('.switch-btn[data-view="' + view + '"]');
    if (btn) btn.classList.add('active');
    setTimeout(animateTimeline, 100);
    setTimeout(animateSkills, 200);
  }

  // ── Expandable ──
  function toggleExpand(btn) {
    btn.classList.toggle('open');
    const content = btn.nextElementSibling;
    if (content) content.classList.toggle('open');
  }

  // ── Timeline scroll animation ──
  function animateTimeline() {
    document.querySelectorAll('.timeline-item').forEach((item, i) => {
      if (item.classList.contains('visible')) return;
      const obs = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            setTimeout(() => item.classList.add('visible'), i * 80);
            obs.unobserve(item);
          }
        });
      }, { threshold: 0.2 });
      obs.observe(item);
    });
  }

  // ── Skill bar animation ──
  function animateSkills() {
    document.querySelectorAll('.skill-bar').forEach(bar => {
      const w = bar.getAttribute('data-w');
      if (!w) return;
      setTimeout(() => { bar.style.width = w + '%'; }, 100);
    });
  }

  // ── Hero spectrum ──
  function animateSpectrum() {
    const progress = document.getElementById('heroProgress');
    if (!progress) return;
    setTimeout(() => { progress.style.width = '100%'; }, 400);
  }

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
    const map = { '1': 'all', '2': 'tdk', '3': 'tb3', '4': 'hiwin' };
    if (map[e.key]) { switchView(map[e.key]); }
  });

  // ── Init ──
  document.addEventListener('DOMContentLoaded', () => {
    loadAllData();
    animateSpectrum();
  });
</script>

</body>
</html>
