<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成長雷達 — 黑皮團隊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --t0: #FF6B6B;
      --t1: #C77DFF;
      --t2: #4CC9F0;
      --cyan: #00F5D4;
      --bg: #0a0a0f;
      --card-bg: #12121a;
      --card-border: rgba(255,255,255,0.07);
      --text: #e0e0e8;
      --text-dim: #8888a0;
      --skill-green: #00E676;
      --skill-yellow: #FFD600;
      --skill-red: #FF5252;
      --tdk: #C77DFF;
      --tb3: #4CC9F0;
      --hy: #00F5D4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── #04 光譜圖：頂部漸層光譜追蹤條 ── */
    #spectrum-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, #FF6B6B 0%, #C77DFF 33%, #4CC9F0 66%, #00F5D4 100%);
      z-index: 1000;
      box-shadow: 0 0 12px rgba(199,125,255,0.5);
    }

    /* 技能光譜追蹤指示器 */
    #spectrum-track {
      position: fixed;
      top: 3px; left: 0;
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.05);
      z-index: 1000;
    }
    #spectrum-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--t0), var(--t1), var(--t2), var(--cyan));
      width: 0%;
      transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0 8px rgba(76,201,240,0.6);
    }

    /* ── 滾動進度條 ── */
    #scroll-progress {
      position: fixed;
      top: 5px; left: 0;
      width: 0%; height: 2px;
      background: rgba(255,255,255,0.3);
      z-index: 1001;
      transition: width 0.1s linear;
    }

    /* ── #06 Pulse：頁面漸入動畫 ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes skillFill {
      from { width: 0%; }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(76,201,240,0.15); }
      50%       { box-shadow: 0 0 35px rgba(76,201,240,0.3); }
    }

    .fade-in {
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ── 容器 ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 52px;
    }
    .header h1 {
      font-size: 2.6rem;
      font-weight: 900;
      background: linear-gradient(135deg, #FF6B6B, #C77DFF, #4CC9F0, #00F5D4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      animation: glow 4s ease-in-out infinite;
    }
    .header p {
      color: var(--text-dim);
      margin-top: 10px;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }

    /* ── #08 Switch：四按鈕切換 ── */
    .view-switcher {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 44px;
      flex-wrap: wrap;
    }
    .view-btn {
      padding: 10px 22px;
      border: 1.5px solid var(--card-border);
      background: var(--card-bg);
      color: var(--text-dim);
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.3s ease;
      outline: none;
    }
    .view-btn:hover {
      border-color: rgba(199,125,255,0.5);
      color: var(--text);
      transform: translateY(-2px);
    }
    .view-btn.active {
      border-color: var(--t1);
      color: #fff;
      background: rgba(199,125,255,0.12);
      box-shadow: 0 0 18px rgba(199,125,255,0.25);
    }
    .view-btn[data-view="tdk"].active   { border-color: var(--tdk); background: rgba(199,125,255,0.12); box-shadow: 0 0 18px rgba(199,125,255,0.25); }
    .view-btn[data-view="tb3"].active  { border-color: var(--tb3); background: rgba(76,201,240,0.12);  box-shadow: 0 0 18px rgba(76,201,240,0.25); }
    .view-btn[data-view="hy"].active   { border-color: var(--cyan); background: rgba(0,245,212,0.12);   box-shadow: 0 0 18px rgba(0,245,212,0.25); }
    .view-btn[data-view="all"].active  { border-color: #FF6B6B;  background: rgba(255,107,107,0.12);   box-shadow: 0 0 18px rgba(255,107,107,0.25); }

    /* ── 鍵盤快速鍵提示 ── */
    .kbd-hint {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.75rem;
      margin-bottom: 32px;
      opacity: 0.6;
    }
    .kbd-hint kbd {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: inherit;
      font-size: 0.72rem;
    }

    /* ── 專案卡片網格 ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .project-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 26px 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease;
      cursor: pointer;
    }
    .project-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 18px 18px 0 0;
    }
    .project-card.tdk::before  { background: linear-gradient(90deg, var(--tdk), #8B5CF6); }
    .project-card.tb3::before { background: linear-gradient(90deg, var(--tb3), #0284C7); }
    .project-card.hy::before   { background: linear-gradient(90deg, var(--cyan), #059669); }

    /* #06 Pulse：卡片 hover 浮動 */
    .project-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }
    .project-card.tdk:hover  { box-shadow: 0 16px 48px rgba(199,125,255,0.15); }
    .project-card.tb3:hover { box-shadow: 0 16px 48px rgba(76,201,240,0.15); }
    .project-card.hy:hover   { box-shadow: 0 16px 48px rgba(0,245,212,0.15); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    .card-title.tdk  { color: var(--tdk); }
    .card-title.tb3  { color: var(--tb3); }
    .card-title.hy   { color: var(--cyan); }

    .card-badge {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 50px;
      font-weight: 500;
      border: 1px solid;
    }
    .badge-phase {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.15);
      color: var(--text-dim);
    }

    /* ── 動態倒數天數 ── */
    .countdown-row {
      display: flex;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .countdown-chip {
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 8px 14px;
      min-width: 90px;
    }
    .cd-label {
      font-size: 0.68rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .cd-value {
      font-size: 1.2rem;
      font-weight: 900;
      line-height: 1;
    }
    .cd-value.tdk  { color: var(--tdk); }
    .cd-value.tb3  { color: var(--tb3); }
    .cd-value.hy   { color: var(--cyan); }

    /* ── 技能 Bar（#06 Pulse 填充動畫 + 三色區分）── */
    .skills-section { margin-bottom: 16px; }
    .skills-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }
    .skill-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .skill-name {
      font-size: 0.78rem;
      color: var(--text);
      width: 100px;
      flex-shrink: 0;
      /* tooltip trigger */
      position: relative;
      cursor: help;
    }
    .skill-name:hover .tooltip-box {
      opacity: 1;
      transform: translateY(-4px);
      pointer-events: auto;
    }
    .tooltip-box {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(0);
      background: #1e1e2e;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.72rem;
      color: var(--text);
      white-space: nowrap;
      max-width: 240px;
      white-space: normal;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      line-height: 1.5;
    }
    .tooltip-box::after {
      content: '';
      position: absolute;
      top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(255,255,255,0.12);
    }
    .skill-state-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green  { background: var(--skill-green); box-shadow: 0 0 5px var(--skill-green); }
    .dot-yellow { background: var(--skill-yellow); box-shadow: 0 0 5px var(--skill-yellow); }
    .dot-red    { background: var(--skill-red); box-shadow: 0 0 5px var(--skill-red); }

    .skill-bar-wrap {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }
    .skill-bar-fill {
      height: 100%;
      border-radius: 3px;
      animation: skillFill 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .skill-bar-fill.green  { background: var(--skill-green); }
    .skill-bar-fill.yellow { background: var(--skill-yellow); }
    .skill-bar-fill.red    { background: var(--skill-red); }

    /* ── #07 Flow：時間線 ── */
    .timeline {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 14px;
      margin-top: 4px;
    }
    .timeline-toggle {
      font-size: 0.78rem;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      transition: color 0.2s;
    }
    .timeline-toggle:hover { color: var(--text); }
    .timeline-toggle .arrow {
      display: inline-block;
      transition: transform 0.3s ease;
    }
    .timeline-toggle.open .arrow { transform: rotate(90deg); }
    .timeline-items {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .timeline-items.open { max-height: 400px; }
    .tl-item {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      font-size: 0.78rem;
      color: var(--text-dim);
      align-items: flex-start;
    }
    .tl-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
      margin-top: 5px;
    }
    .tl-dot.done { background: var(--skill-green); }
    .tl-dot.now  { background: var(--skill-yellow); box-shadow: 0 0 6px var(--skill-yellow); }
    .tl-content strong { color: var(--text); font-weight: 500; }

    /* ── Tag ── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
    }
    .tag {
      font-size: 0.68rem;
      padding: 3px 9px;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-dim);
      cursor: help;
      position: relative;
      transition: background 0.2s, color 0.2s;
    }
    .tag:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .tag:hover .tooltip-box { opacity: 1; transform: translateY(-4px); pointer-events: auto; }

    /* ── 空白提示 ── */
    .empty-state {
      text-align: center;
      color: var(--text-dim);
      padding: 60px 0;
      font-size: 0.9rem;
    }

    /* ── 底部鍵盤提示 ── */
    .footer-hint {
      text-align: center;
      margin-top: 60px;
      color: var(--text-dim);
      font-size: 0.72rem;
      opacity: 0.4;
    }
  </style>
</head>
<body>

          { label: '初審通過',    tooltip: '2026/03/27 公告入選，須通過安全測驗' },
          { label: '外島補助',    tooltip: '金門地區最高補助 15,000 元' },
          { label: '雙敗淘汰',    tooltip: '小組賽 → 四強雙敗，最終決出冠亞軍' }
        ]
      }
    ];

    // ── 動態倒數天數計算 ─────────────────────────────────────
    function daysUntil(dateStr) {
      const now = new Date();
      // 設為今天收盤（23:59:59）比較直觀
      const target = new Date(dateStr + 'T23:59:59');
      const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
      return diff;
    }

    function buildCard(project, animDelay) {
      // 動態倒數
      const countdowns = project.targets.map(t => ({
        ...t,
        days: daysUntil(t.date)
      }));

      // 技能三色
      const skillRows = project.skills.map(s => `
        <div class="skill-row">
          <div class="skill-state-dot dot-${s.state}"></div>
          <span class="skill-name">
            ${s.name}
            <div class="tooltip-box">${s.tooltip}</div>
          </span>
          <div class="skill-bar-wrap">
            <div class="skill-bar-fill ${s.state}"
                 style="width:${s.level}%; animation-delay:${animDelay * 0.08}s"></div>
          </div>
        </div>
      `).join('');

      // 時間線（#07 Flow）
      const tlItems = project.timeline.map(item => `
        <div class="tl-item">
          <div class="tl-dot ${item.done ? 'done' : item.now ? 'now' : ''}"></div>
          <div class="tl-content">${item.now ? '<strong>' : ''}${item.text}${item.now ? '</strong>' : ''}</div>
        </div>
      `).join('');

      // Tags
      const tags = project.tags.map(t => `
        <span class="tag">
          ${t.label}
          <div class="tooltip-box">${t.tooltip}</div>
        </span>
      `).join('');

      return `
        <div class="project-card ${project.id} fade-in"
             id="card-${project.id}"
             style="animation-delay:${animDelay}s"
             data-project="${project.id}">

          <div class="card-header">
            <div>
              <div class="card-title ${project.id}">${project.title}</div>
              <div style="font-size:0.75rem;color:var(--text-dim);margin-top:2px">${project.subtitle}</div>
            </div>
            <span class="card-badge badge-phase">${project.phase}</span>
          </div>

          <!-- 動態倒數天數 -->
          <div class="countdown-row">
            ${countdowns.map(c => `
              <div class="countdown-chip">
                <span class="cd-label">${c.label}</span>
                <span class="cd-value ${project.id}" id="cd-${c.key}">—</span>
              </div>
            `).join('')}
          </div>

          <!-- 技能 Bar（#06 + 三色）-->
          <div class="skills-section">
            <div class="skills-label">技能樹</div>
            ${skillRows}
          </div>

          <!-- #07 Flow：時間線 -->
          <div class="timeline">
            <div class="timeline-toggle" onclick="toggleTl(this)">
              <span class="arrow">▶</span> 時間線
            </div>
            <div class="timeline-items">
              ${tlItems}
            </div>
          </div>

          <!-- Tags -->
          <div class="tags">${tags}</div>
        </div>
      `;
    }

    function renderCards(filter = 'all') {
      const container = document.getElementById('cards-container');
      const filtered = filter === 'all'
        ? projects
        : projects.filter(p => p.id === filter);

      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">此專案檢視中尚無資料</div>';
        return;
      }

      container.innerHTML = filtered
        .map((p, i) => buildCard(p, 0.1 + i * 0.12))
        .join('');

      // 驅動倒數數字
      updateCountdowns();
      // 更新光譜追蹤
      updateSpectrum();
    }

    function updateCountdowns() {
      projects.forEach(p => {
        p.targets.forEach(t => {
          const el = document.getElementById('cd-' + t.key);
          if (el) {
            const days = daysUntil(t.date);
            el.textContent = days > 0 ? days + '天' : (days === 0 ? '今日' : '已過');
          }
        });
      });
    }

    // ── #07 Flow：時間線點擊展開 ──
    function toggleTl(btn) {
      btn.classList.toggle('open');
      btn.nextElementSibling.classList.toggle('open');
    }

    // ── #08 Switch：視角切換 ──
    function setView(view) {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.view-btn[data-view="${view}"]`).classList.add('active');
      renderCards(view);
    }

    // ── 鍵盤快速鍵 ──
    const keyMap = { '1': 'all', '2': 'tdk', '3': 'tb3', '4': 'hy' };
    document.addEventListener('keydown', e => {
      if (keyMap[e.key]) setView(keyMap[e.key]);
    });

    // ── 滾動進度條 ──
    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      document.getElementById('scroll-progress').style.width = pct + '%';
    });

    // ── 光譜追蹤（平均技能進度）──
    function updateSpectrum() {
      const allSkills = projects.flatMap(p => p.skills);
      // state: green=100%, yellow=60%, red=30%
      const stateWeight = { green: 100, yellow: 60, red: 30 };
      const avg = allSkills.reduce((sum, s) => sum + (stateWeight[s.state] || 0), 0) / allSkills.length;
      document.getElementById('spectrum-fill').style.width = avg + '%';
    }

    // 初始化
    renderCards('all');
  </script>
</body>
</html>
