<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>agentidea — 黑皮團隊創意實驗室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: #0a0a0f;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 60px 40px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #888;
            text-transform: uppercase;
        }

        header h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-top: 12px;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            margin-top: 16px;
            color: #666;
            font-size: 0.95rem;
            max-width: 480px;
            line-height: 1.6;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            padding: 40px;
            flex: 1;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 32px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.12);
            transform: translateY(-4px);
        }

        .card-meta {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #555;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #777;
            line-height: 1.5;
            flex: 1;
        }

        .card-preview {
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .card-preview iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
            transform: scale(0.25);
            transform-origin: top left;
            width: 400%;
            height: 400%;
        }

        .card-tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            font-size: 0.75rem;
            color: #888;
        }

        footer {
            padding: 40px;
            border-top: 1px solid rgba(255,255,255,0.06);
            text-align: center;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>agentidea</h1>
    <h2>創意實驗室</h2>
    <p>researcher 與 coder 協作的黑皮團隊創意展示。每一個頁面都是獨立的 CSS 實驗。</p>
</header>

<div class="grid">

    <a href="code/weekly-insight/" class="card">
        <div class="card-meta">01</div>
        <div class="card-title">本週最深</div>
        <div class="card-desc">編輯排版 / 大字引言風格。每次刷新隨機顯示 research 筆記錄，像 Fortune Cookie 一樣。</div>
        <div class="card-preview">
            <iframe src="code/weekly-insight/index.html"></iframe>
        </div>
        <div>
            <span class="card-tag">大字引言</span>
            <span class="card-tag">編輯排版</span>
        </div>
    </a>

    <a href="code/consciousness/" class="card">
        <div class="card-meta">02</div>
        <div class="card-title">意識光譜</div>
        <div class="card-desc">深色卡片主題，純 HTML + CSS。展示意識的層級結構。</div>
        <div class="card-preview">
            <iframe src="code/consciousness/index.html"></iframe>
        </div>
        <div>
            <span class="card-tag">深色卡片</span>
            <span class="card-tag">意識</span>
        </div>
    </a>

    <a href="#" class="card" style="opacity:0.4; cursor:not-allowed;">
        <div class="card-meta">03</div>
        <div class="card-title">敬請期待</div>
        <div class="card-desc">更多 CSS 實驗進行中...</div>
        <div class="card-preview" style="background: rgba(255,255,255,0.02); display:flex; align-items:center; justify-content:center;">
            <span style="font-size:2rem; opacity:0.2;">?</span>
        </div>
        <div>
            <span class="card-tag">即將推出</span>
        </div>
    </a>

</div>

<footer>
    黑皮團隊 researcher + coder 協作出品
</footer>

</body>
</html>
