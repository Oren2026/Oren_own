<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行事曆 — TDK & TB3 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Left Sidebar: Todo List -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>📋 待辦事項</h2>
      <span>點擊即可查看詳情</span>
    </div>
    <div class="todo-list" id="todoList"></div>
  </aside>

  <!-- Main Calendar -->
  <main class="main">
    <div class="header">
      <h1 id="headerTitle">載入中...</h1>
      <div style="display:flex;gap:8px;">
        <button class="nav-btn" id="prevBtn">◀ 上一月</button>
        <button class="nav-btn today-btn" id="todayBtn">今天</button>
        <button class="nav-btn" id="nextBtn">下一月 ▶</button>
      </div>
    </div>

    <div class="calendar-container">
      <div class="weekday-row" id="weekdayRow"></div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </main>

  <!-- Event Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-date" id="modalDate"></span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-title" id="modalTitle"></div>
        <div id="modalDetail"></div>
      </div>
    </div>
  </div>

  <script src="events.js"></script>
  <script src="app.js"></script>
</body>
</html>
