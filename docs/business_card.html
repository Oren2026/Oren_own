<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名片</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', 'PingFang TC', sans-serif;
      padding: 20px;
    }

    .card {
      width: 420px;
      height: 240px;
      background: linear-gradient(135deg, #0f0f1a 0%, #1e1e30 100%);
      border-radius: 16px;
      padding: 36px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -20%;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }

    .name-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .name {
      font-size: 26px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 2px;
    }

    .title {
      font-size: 13px;
      color: #818cf8;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(99, 102, 241, 0.4), rgba(168, 85, 247, 0.2), transparent);
      position: relative;
      z-index: 1;
    }

    .bottom {
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      z-index: 1;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #94a3b8;
    }

    .contact-row .icon {
      width: 16px;
      text-align: center;
      color: #6366f1;
      flex-shrink: 0;
    }

    .company {
      font-size: 13px;
      color: #cbd5e1;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .contact-row a {
      color: #94a3b8;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-row a:hover {
      color: #818cf8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="name-block">
        <div class="name">王小明</div>
        <div class="title">軟體工程師</div>
      </div>
      <div class="logo">SM</div>
    </div>

    <div class="divider"></div>

    <div class="bottom">
      <div class="company">創新科技有限公司</div>
      <div class="contact-row">
        <span class="icon">✆</span>
        <span>+886 912 345 678</span>
      </div>
      <div class="contact-row">
        <span class="icon">✉</span>
        <a href="mailto:wang@example.com">wang@example.com</a>
      </div>
      <div class="contact-row">
        <span class="icon">⌂</span>
        <span>台北市信義區忠孝東路一段100號</span>
      </div>
    </div>
  </div>
</body>
</html>
