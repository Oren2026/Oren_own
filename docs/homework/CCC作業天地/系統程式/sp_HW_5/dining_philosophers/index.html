<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>哲學家用餐問題 - Deadlock 演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Courier New', monospace;
      padding: 20px;
    }
    h1 { text-align: center; color: #00d4ff; margin-bottom: 10px; }
    .container { max-width: 900px; margin: 0 auto; }

    .info-box {
      background: #16213e;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      font-size: 14px;
      line-height: 1.6;
    }
    .info-box.danger { border-left: 4px solid #e94560; }
    .info-box.green { border-left: 4px solid #6bcb77; }
    .info-box h3 { margin-bottom: 8px; }

    .mode-toggle {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .mode-toggle label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .mode-toggle input:checked + span { color: #00d4ff; }

    .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-danger { background: #e94560; color: white; }
    .btn-primary { background: #0f3460; color: #00d4ff; }
    .btn-success { background: #1b9c4e; color: white; }

    .table {
      position: relative;
      width: 400px;
      height: 400px;
      margin: 0 auto 20px;
      border: 3px solid #0f3460;
      border-radius: 50%;
      background: #16213e;
    }

    .philosopher {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      transition: all 0.3s;
      background: #0f3460;
      border: 2px solid #00d4ff;
      z-index: 2;
    }
    .philosopher.thinking { background: #0f3460; border-color: #555; color: #888; }
    .philosopher.hungry { background: #2a2a0a; border-color: #ffd93d; color: #ffd93d; }
    .philosopher.eating { background: #0a2a1a; border-color: #6bcb77; color: #6bcb77; }
    .philosopher.waiting { background: #2a0a0a; border-color: #e94560; color: #e94560; }
    .philosopher.deadlock { background: #3a0a0a; border-color: #ff4444; color: #ff4444; animation: blink 0.5s infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .chopstick {
      position: absolute;
      width: 6px;
      height: 50px;
      background: #444;
      border-radius: 3px;
      z-index: 1;
      transition: all 0.3s;
    }
    .chopstick.used { background: #ffd93d; }
    .chopstick-label {
      position: absolute;
      font-size: 10px;
      color: #555;
    }

    /* 5 philosophers positioned around the table */
    /* 0 = top, then clockwise: 0,1,2,3,4 */
    .phil-0 { top: -10px; left: 50%; transform: translateX(-50%) translateY(-50%); }
    .phil-1 { top: 90px; right: -10px; transform: translateX(50%) translateY(-50%); }
    .phil-2 { bottom: -10px; left: 50%; transform: translateX(-50%) translateY(50%); }
    .phil-3 { bottom: 90px; left: -10px; transform: translateX(-50%) translateY(-50%); }
    .phil-4 { top: 90px; left: -10px; transform: translateX(-50%) translateY(-50%); }

    /* chopsticks between philosophers (between 0-1, 1-2, 2-3, 3-4, 4-0) */
    .chop-0 { top: 45px; right: 55px; transform: rotate(30deg); } /* between 0 and 1 */
    .chop-1 { top: 155px; right: -3px; transform: rotate(90deg); } /* between 1 and 2 */
    .chop-2 { bottom: 45px; right: 55px; transform: rotate(150deg); } /* between 2 and 3 */
    .chop-3 { bottom: 45px; left: 55px; transform: rotate(-150deg); } /* between 3 and 4 */
    .chop-4 { top: 155px; left: -3px; transform: rotate(-90deg); } /* between 4 and 0 */

    .status-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }
    .phil-status {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      border: 1px solid;
    }
    .phil-status.thinking { border-color: #555; color: #888; }
    .phil-status.hungry { border-color: #ffd93d; color: #ffd93d; }
    .phil-status.eating { border-color: #6bcb77; color: #6bcb77; }
    .phil-status.waiting { border-color: #e94560; color: #e94560; }
    .phil-status.deadlock { border-color: #ff4444; color: #ff4444; }

    .log-box {
      background: #0d1b2a;
      border-radius: 8px;
      padding: 12px;
      height: 150px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.8;
    }
    .log-line { border-bottom: 1px solid #1a2a4a; padding: 1px 4px; }
    .log-line.eat { color: #6bcb77; }
    .log-line.think { color: #888; }
    .log-line.hungry { color: #ffd93d; }
    .log-line.lock { color: #ffd93d; }
    .log-line.unlock { color: #6bcb77; }
    .log-line.deadlock { color: #ff4444; font-weight: bold; }
    .log-line.info { color: #555; }
  </style>
</head>
<body>
<div class="container">
  <h1>🍜 哲學家用餐問題</h1>

  <div class="info-box danger">
    <h3>🔴 潛在死結情境</h3>
    每個哲學家都先拿起左邊的筷子再去拿右邊的筷子。
    當 5 個人同時拿起左邊的筷子，右邊的筷子都被鄰居拿著，沒有人能吃飯——形成**循環等待（Circular Wait）**，死結！
  </div>

  <div class="info-box green">
    <h3>🟢 解決方案：固定加鎖順序</h3>
    編號 0-4，強制「先拿編號小的筷子」。
    哲學家 0：先拿筷子 0；哲學家 1：先拿筷子 0（已被拿走，等！）
    不會形成循環，執行緒 0 永遠先拿到兩支筷子吃飯 → 吃完釋放 → 下一位。
  </div>

  <div class="mode-toggle">
    <label>
      <input type="radio" name="mode" value="unsafe" checked onchange="setMode('unsafe')">
      <span>🔴 無順序（會死結）</span>
    </label>
    <label>
      <input type="radio" name="mode" value="safe" onchange="setMode('safe')">
      <span>🟢 固定順序（防死結）</span>
    </label>
  </div>

  <div class="controls">
    <button class="btn-success" id="btnStep" onclick="doStep()">⚡ 單步執行</button>
    <button class="btn-danger" id="btnAuto" onclick="startAuto()">▶ 自動執行</button>
    <button class="btn-primary" onclick="resetSim()">🔄 重置</button>
  </div>

  <div class="status-row" id="statusRow"></div>

  <div class="table" id="table">
    <!-- Chopsticks -->
    <div class="chopstick chop-0" id="chop0"></div>
    <div class="chopstick chop-1" id="chop1"></div>
    <div class="chopstick chop-2" id="chop2"></div>
    <div class="chopstick chop-3" id="chop3"></div>
    <div class="chopstick chop-4" id="chop4"></div>
    <!-- Philosophers -->
    <div class="philosopher phil-0 thinking" id="phil0">P0<br>思考中</div>
    <div class="philosopher phil-1 thinking" id="phil1">P1<br>思考中</div>
    <div class="philosopher phil-2 thinking" id="phil2">P2<br>思考中</div>
    <div class="philosopher phil-3 thinking" id="phil3">P3<br>思考中</div>
    <div class="philosopher phil-4 thinking" id="phil4">P4<br>思考中</div>
  </div>

  <div class="log-box" id="logBox"></div>
</div>

<script>
const N = 5;
let chopsticks = new Array(N).fill(false); // false = available
let state = new Array(N).fill('thinking'); // thinking, hungry, eating, waiting
let stepCount = 0;
let useOrder = false;
let running = false;
let deadlockDetected = false;
let autoTimer = null;

function log(msg, type = 'info') {
  const box = document.getElementById('logBox');
  const div = document.createElement('div');
  div.className = 'log-line ' + type;
  div.textContent = `[${++stepCount}] ${msg}`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function updateUI() {
  for (let i = 0; i < N; i++) {
    const phil = document.getElementById('phil' + i);
    phil.className = 'philosopher phil-' + i + ' ' + state[i];
    const labels = ['思考中', '飢餓中', '吃飯中', '等待中...', '⚠ 死結！'];
    phil.innerHTML = `P${i}<br>${labels[state[i] === 'thinking' ? 0 : state[i] === 'hungry' ? 1 : state[i] === 'eating' ? 2 : state[i] === 'waiting' ? 3 : 4]}`;
  }
  // Update chopstick visual
  for (let i = 0; i < N; i++) {
    document.getElementById('chop' + i).className = 'chopstick chop-' + i + (chopsticks[i] ? ' used' : '');
  }
  // Update status row
  const row = document.getElementById('statusRow');
  row.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const div = document.createElement('div');
    div.className = 'phil-status ' + state[i];
    div.textContent = `P${i}: ${state[i] === 'thinking' ? '思考' : state[i] === 'hungry' ? '飢餓' : state[i] === 'eating' ? '吃飯' : state[i] === 'waiting' ? '等待' : '死結'}`;
    row.appendChild(div);
  }
}

function left(i) { return i; }
function right(i) { return (i + 1) % N; }

function canEat(i) {
  return !chopsticks[left(i)] && !chopsticks[right(i)];
}

function tryAcquire(i) {
  if (useOrder) {
    // 固定順序：先拿編號小的
    const [first, second] = left(i) < right(i) ? [left(i), right(i)] : [right(i), left(i)];
    if (!chopsticks[first]) {
      chopsticks[first] = true;
      log(`P${i} 拿取筷子 ${first}`, 'lock');
      if (!chopsticks[second]) {
        chopsticks[second] = true;
        log(`P${i} 拿取筷子 ${second}`, 'lock');
        return true;
      } else {
        log(`P${i} 等待筷子 ${second}...`, 'hungry');
        return false;
      }
    } else {
      log(`P${i} 等待筷子 ${first}...`, 'hungry');
      return false;
    }
  } else {
    // 無順序：左手優先
    if (!chopsticks[left(i)]) {
      chopsticks[left(i)] = true;
      log(`P${i} 拿起左邊筷子 ${left(i)}`, 'lock');
      if (!chopsticks[right(i)]) {
        chopsticks[right(i)] = true;
        log(`P${i} 拿起右邊筷子 ${right(i)}`, 'lock');
        return true;
      } else {
        log(`P${i} 等待右邊筷子 ${right(i)}...`, 'hungry');
        return false;
      }
    } else {
      log(`P${i} 等待左邊筷子 ${left(i)}...`, 'hungry');
      return false;
    }
  }
}

function release(i) {
  chopsticks[left(i)] = false;
  chopsticks[right(i)] = false;
  log(`P${i} 放下筷子 ${left(i)} 和 ${right(i)}`, 'unlock');
  state[i] = 'thinking';
}

async function doStep() {
  if (running) return;
  running = true;

  if (deadlockDetected) {
    running = false;
    return;
  }

  // 找到處於飢餓或等待狀態的哲學家，嘗試吃飯
  let madeProgress = false;

  for (let i = 0; i < N; i++) {
    if (state[i] === 'thinking') {
      state[i] = 'hungry';
      log(`P${i} 感到飢餓，嘗試拿筷子`, 'hungry');
      updateUI();
      madeProgress = true;
      break; // 一次只讓一個哲學家行動
    }
    if (state[i] === 'hungry' || state[i] === 'waiting') {
      if (canEat(i)) {
        state[i] = 'eating';
        log(`P${i} 開始吃飯！`, 'eat');
      } else {
        state[i] = 'waiting';
      }
      updateUI();
      madeProgress = true;
      break;
    }
    if (state[i] === 'eating') {
      release(i);
      updateUI();
      madeProgress = true;
      break;
    }
  }

  // 檢查死結：所有人都在等待/飢餓且拿不到筷子
  const allStuck = state.every(s => s === 'waiting' || s === 'hungry') && !state.some(s => s === 'eating');
  if (allStuck && !madeProgress) {
    state = state.map(() => 'waiting');
    deadlockDetected = true;
    state[0] = 'deadlock'; // 標記第一個為死結顯示
    for (let i = 1; i < N; i++) state[i] = 'waiting';
    log('⚠ DEADLOCK! 所有哲學家都在等待鄰居的筷子，沒人能吃飯', 'deadlock');
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btnAuto').textContent = '▶ 自動執行'; }
    updateUI();
    running = false;
    return;
  }

  running = false;
}

function startAuto() {
  if (autoTimer) {
    clearInterval(autoTimer);
    autoTimer = null;
    document.getElementById('btnAuto').textContent = '▶ 自動執行';
    return;
  }
  document.getElementById('btnAuto').textContent = '⏸ 暫停';
  autoTimer = setInterval(doStep, 600);
}

function resetSim() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btnAuto').textContent = '▶ 自動執行'; }
  chopsticks = new Array(N).fill(false);
  state = new Array(N).fill('thinking');
  stepCount = 0;
  running = false;
  deadlockDetected = false;
  document.getElementById('logBox').innerHTML = '';
  log('哲學家們開始思考...', 'info');
  updateUI();
}

function setMode(mode) {
  useOrder = (mode === 'safe');
  resetSim();
}

resetSim();
</script>
</body>
</html>
