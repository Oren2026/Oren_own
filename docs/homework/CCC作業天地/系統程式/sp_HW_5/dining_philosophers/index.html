<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>哲學家用餐問題 - Deadlock 演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Courier New', monospace;
      padding: 20px;
    }
    h1 { text-align: center; color: #00d4ff; margin-bottom: 10px; }
    .container { max-width: 950px; margin: 0 auto; }

    .info-box {
      background: #16213e;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      font-size: 14px;
      line-height: 1.6;
    }
    .info-box.danger { border-left: 4px solid #e94560; }
    .info-box.green { border-left: 4px solid #6bcb77; }
    .info-box h3 { margin-bottom: 6px; }

    .mode-toggle {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .mode-toggle label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .mode-toggle input:checked + span { color: #00d4ff; font-weight: bold; }

    .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-danger { background: #e94560; color: white; }
    .btn-primary { background: #0f3460; color: #00d4ff; }
    .btn-success { background: #1b9c4e; color: white; }

    .status-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .phil-status {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      border: 1px solid;
    }
    .phil-status.thinking { border-color: #555; color: #888; }
    .phil-status.hungry { border-color: #ffd93d; color: #ffd93d; }
    .phil-status.eating { border-color: #6bcb77; color: #6bcb77; }
    .phil-status.deadlock { border-color: #ff4444; color: #ff4444; background: #2a0000; }

    .table-area {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
    }
    .table {
      position: relative;
      width: 400px;
      height: 400px;
      border: 3px solid #0f3460;
      border-radius: 50%;
      background: #16213e;
    }

    .philosopher {
      position: absolute;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      transition: all 0.3s;
      background: #0f3460;
      border: 2px solid #555;
      z-index: 2;
      text-align: center;
      line-height: 1.3;
    }
    .philosopher.thinking { background: #0f3460; border-color: #555; color: #888; }
    .philosopher.hungry { background: #1a1a00; border-color: #ffd93d; color: #ffd93d; }
    .philosopher.eating { background: #001a0a; border-color: #6bcb77; color: #6bcb77; }
    .philosopher.deadlock { background: #2a0000; border-color: #ff4444; color: #ff4444; }

    .chopstick {
      position: absolute;
      width: 7px;
      height: 55px;
      background: #555;
      border-radius: 3px;
      z-index: 1;
      transition: all 0.3s;
    }
    .chopstick.used { background: #ffd93d; box-shadow: 0 0 8px #ffd93d55; }
    .chopstick-label {
      position: absolute;
      font-size: 10px;
      color: #555;
    }

    .phil-0 { top: -6px; left: 50%; transform: translateX(-50%) translateY(-50%); }
    .phil-1 { top: 85px; right: -6px; transform: translateX(50%) translateY(0); }
    .phil-2 { bottom: -6px; left: 50%; transform: translateX(-50%) translateY(50%); }
    .phil-3 { bottom: 85px; left: -6px; transform: translateX(0) translateY(0); }
    .phil-4 { top: 85px; left: -6px; transform: translateX(0) translateY(0); }

    /* 筷子在哲學家之間 */
    /* chop 0: between phil 0 (top) and phil 1 (right) */
    .chop-0 { top: 40px; right: 50px; transform: rotate(35deg); transform-origin: top center; }
    /* chop 1: between phil 1 (right) and phil 2 (bottom) */
    .chop-1 { top: 155px; right: -3px; transform: rotate(85deg); transform-origin: top center; }
    /* chop 2: between phil 2 (bottom) and phil 3 (left-bottom) */
    .chop-2 { bottom: 40px; right: 50px; transform: rotate(145deg); transform-origin: bottom center; }
    /* chop 3: between phil 3 (left-bottom) and phil 4 (left-top) */
    .chop-3 { bottom: 40px; left: 50px; transform: rotate(-145deg); transform-origin: bottom center; }
    /* chop 4: between phil 4 (left-top) and phil 0 (top) */
    .chop-4 { top: 155px; left: -3px; transform: rotate(-85deg); transform-origin: top center; }

    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
    }
    .legend span { display: flex; align-items: center; gap: 5px; }

    .log-box {
      background: #0d1b2a;
      border-radius: 8px;
      padding: 12px;
      height: 160px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.8;
    }
    .log-line { border-bottom: 1px solid #1a2a4a; padding: 1px 4px; }
    .log-line.eat { color: #6bcb77; }
    .log-line.think { color: #888; }
    .log-line.hungry { color: #ffd93d; }
    .log-line.lock { color: #ffd93d; }
    .log-line.unlock { color: #6bcb77; }
    .log-line.deadlock { color: #ff4444; font-weight: bold; }
    .log-line.info { color: #555; }
    .log-line.sequential { color: #00d4ff; }
  </style>
</head>
<body>
<div class="container">
  <h1>🍜 哲學家用餐問題</h1>

  <div class="info-box danger">
    <h3>🔴 無順序（會死結）</h3>
    每個哲學家都「先拿左邊，再拿右邊」筷子。當 5 人同時搶走左邊的筷子，右邊的都被鄰居拿著 → <strong>循環等待，死結！</strong>
  </div>

  <div class="info-box green">
    <h3>🟢 固定順序（防死結）</h3>
    規定：所有哲學家都先拿「編號較小的筷子」。
    <br>→ P0、P1、P2、P3、P4 都搶筷子0，但只有 P0 先拿到。P0 吃完 → 釋放 → P1 才能繼續。
    <br>→ 形成鎖鏈（Chain）而非循環，不會死結。
  </div>

  <div class="mode-toggle">
    <label>
      <input type="radio" name="mode" value="unsafe" checked onchange="setMode('unsafe')">
      <span>🔴 無順序（左手優先）→ 死結</span>
    </label>
    <label>
      <input type="radio" name="mode" value="safe" onchange="setMode('safe')">
      <span>🟢 固定順序（先拿編號小的）→ 不死結</span>
    </label>
  </div>

  <div class="controls">
    <button class="btn-success" id="btnStep" onclick="doStep()">⚡ 單步執行</button>
    <button class="btn-danger" id="btnAuto" onclick="startAuto()">▶ 自動執行</button>
    <button class="btn-primary" onclick="resetSim()">🔄 重置</button>
  </div>

  <div class="status-row" id="statusRow"></div>

  <div class="legend">
    <span>🟡 飢餓</span>
    <span>🟢 吃飯</span>
    <span>⚫ 思考</span>
    <span>🔴 死結</span>
  </div>

  <div class="table-area">
    <div class="table" id="table">
      <div class="chopstick chop-0" id="chop0"></div>
      <div class="chopstick chop-1" id="chop1"></div>
      <div class="chopstick chop-2" id="chop2"></div>
      <div class="chopstick chop-3" id="chop3"></div>
      <div class="chopstick chop-4" id="chop4"></div>
      <div class="philosopher phil-0 thinking" id="phil0">P0<br>思考中</div>
      <div class="philosopher phil-1 thinking" id="phil1">P1<br>思考中</div>
      <div class="philosopher phil-2 thinking" id="phil2">P2<br>思考中</div>
      <div class="philosopher phil-3 thinking" id="phil3">P3<br>思考中</div>
      <div class="philosopher phil-4 thinking" id="phil4">P4<br>思考中</div>
    </div>
  </div>

  <div class="log-box" id="logBox"></div>
</div>

<script>
const N = 5;
let chopsticks = new Array(N).fill(false); // 筷子狀態：false=可用, true=被占用
let state = new Array(N).fill('thinking'); // thinking, hungry, eating, deadlock
let holding = new Array(N).fill(-1); // 記錄哲學家當前持有一支筷子時拿的是哪支（用於調適）
let useOrder = false;
let stepCount = 0;
let deadlockDetected = false;
let eatCount = new Array(N).fill(0);
let autoTimer = null;
let globalSeq = 0;

function left(i) { return i; }
function right(i) { return (i + 1) % N; }

function log(msg, type = 'info') {
  const box = document.getElementById('logBox');
  const div = document.createElement('div');
  div.className = 'log-line ' + type;
  div.textContent = `[${++globalSeq}] ${msg}`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function updateUI() {
  for (let i = 0; i < N; i++) {
    const phil = document.getElementById('phil' + i);
    phil.className = 'philosopher phil-' + i + ' ' + state[i];
    const labels = ['思考中', '飢餓中', '吃飯中', '⚠ 死結'];
    const idx = state[i] === 'thinking' ? 0 : state[i] === 'hungry' ? 1 : state[i] === 'eating' ? 2 : 3;
    phil.innerHTML = `P${i}<br>${labels[idx]}`;
  }
  for (let i = 0; i < N; i++) {
    document.getElementById('chop' + i).className = 'chopstick chop-' + i + (chopsticks[i] ? ' used' : '');
  }
  const row = document.getElementById('statusRow');
  row.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const div = document.createElement('div');
    div.className = 'phil-status ' + state[i];
    const label = state[i] === 'thinking' ? '思考' : state[i] === 'hungry' ? '飢餓' : state[i] === 'eating' ? '吃飯中' : '死結';
    div.textContent = `P${i}: ${label}`;
    row.appendChild(div);
  }
}

function tryAcquire(i) {
  if (useOrder) {
    // ===== 固定順序：先拿編號小的 =====
    const [first, second] = left(i) < right(i) ? [left(i), right(i)] : [right(i), left(i)];
    if (!chopsticks[first]) {
      chopsticks[first] = true;
      holding[i] = first;
      log(`P${i} 拿到筷子 ${first}（編號小）`, 'lock');
      if (!chopsticks[second]) {
        chopsticks[second] = true;
        log(`P${i} 拿到筷子 ${second} → 開始吃飯！`, 'eat');
        holding[i] = -1;
        return 'eating';
      } else {
        // 第一支拿到了，但第二支被占用 → 釋放第一支，等待
        log(`P${i} 等筷子 ${second}... 先釋放 ${first}`, 'hungry');
        chopsticks[first] = false;
        holding[i] = -1;
        return 'hungry';
      }
    } else {
      log(`P${i} 等待筷子 ${first}...`, 'hungry');
      return 'hungry';
    }
  } else {
    // ===== 無順序：左手（left）優先 =====
    // 這會造成循環等待：所有人同時拿到左邊，等右邊 → 死結
    if (!chopsticks[left(i)]) {
      chopsticks[left(i)] = true;
      holding[i] = left(i);
      log(`P${i} 拿到筷子 ${left(i)}（左手）`, 'lock');
      if (!chopsticks[right(i)]) {
        chopsticks[right(i)] = true;
        log(`P${i} 拿到筷子 ${right(i)} → 開始吃飯！`, 'eat');
        holding[i] = -1;
        return 'eating';
      } else {
        log(`P${i} 等筷子 ${right(i)}...（右手被鄰居拿著）`, 'hungry');
        return 'hungry';
      }
    } else {
      log(`P${i} 等筷子 ${left(i)}...（左手被鄰居拿著）`, 'hungry');
      return 'hungry';
    }
  }
}

function release(i) {
  chopsticks[left(i)] = false;
  chopsticks[right(i)] = false;
  holding[i] = -1;
  log(`P${i} 吃完，放下筷子 ${left(i)} 和 ${right(i)}`, 'unlock');
  state[i] = 'thinking';
}

function checkDeadlock() {
  // 死結條件：所有人都在飢餓/等待，且沒有人在吃飯
  return state.every(s => s === 'hungry') && !state.some(s => s === 'eating');
}

let currentPhil = 0; // 輪流處理的哲學家指標

function doStep() {
  if (deadlockDetected) return;

  let madeProgress = false;

  // 輪流檢查每個哲學家（每次只讓一個採取行動）
  for (let attempt = 0; attempt < N; attempt++) {
    const i = (currentPhil + attempt) % N;

    if (state[i] === 'thinking') {
      state[i] = 'hungry';
      log(`P${i} 感到飢餓，嘗試拿筷子`, 'hungry');
      const result = tryAcquire(i);
      state[i] = result;
      if (result === 'eating') eatCount[i]++;
      madeProgress = true;
      break;
    }

    if (state[i] === 'hungry') {
      // 再次嘗試獲取筷子
      const result = tryAcquire(i);
      state[i] = result;
      if (result === 'eating') eatCount[i]++;
      madeProgress = true;
      break;
    }

    if (state[i] === 'eating') {
      release(i);
      madeProgress = true;
      break;
    }
  }

  currentPhil = (currentPhil + 1) % N;
  updateUI();

  // 檢查死結
  if (checkDeadlock()) {
    state = state.map(() => 'deadlock');
    deadlockDetected = true;
    log('⚠ DEADLOCK! 所有哲學家都在等待鄰居的筷子，形成循環等待，沒人能吃飯', 'deadlock');
    updateUI();
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
    return;
  }

  // 安全模式下：如果連續很多輪都沒有人吃飯，說明發生了飢餓（starvation）
  // 但邏輯上固定順序不會死結，只會有飢餓問題（某個哲學家很久沒吃到）
}

function startAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btnAuto').textContent = '▶ 自動執行'; return; }
  document.getElementById('btnAuto').textContent = '⏸ 暫停中';
  autoTimer = setInterval(doStep, 700);
}

function resetSim() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btnAuto').textContent = '▶ 自動執行'; }
  chopsticks = new Array(N).fill(false);
  state = new Array(N).fill('thinking');
  holding = new Array(N).fill(-1);
  eatCount = new Array(N).fill(0);
  stepCount = 0;
  globalSeq = 0;
  deadlockDetected = false;
  currentPhil = 0;
  document.getElementById('logBox').innerHTML = '';
  log('=== 哲學家們開始思考人生... ===', 'info');
  if (!useOrder) {
    log('模式：無順序（左手優先）— 點「自動執行」觀察死結形成', 'info');
  } else {
    log('模式：固定順序（先拿編號小的）— 點「自動執行」觀察正常運作', 'sequential');
  }
  updateUI();
}

function setMode(mode) {
  useOrder = (mode === 'safe');
  resetSim();
}

resetSim();
</script>
</body>
</html>
