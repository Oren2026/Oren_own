<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>哲學家用餐問題 - Deadlock 演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Courier New', monospace;
      padding: 20px;
    }
    h1 { text-align: center; color: #00d4ff; margin-bottom: 10px; }
    .back-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #0f3460;
      color: #00d4ff;
      border: none;
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      z-index: 100;
    }
    .back-btn:hover { background: #1a4a7a; }
    .container { max-width: 950px; margin: 0 auto; }

    .info-box {
      background: #16213e;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      font-size: 14px;
      line-height: 1.6;
    }
    .info-box.danger { border-left: 4px solid #e94560; }
    .info-box.green { border-left: 4px solid #6bcb77; }
    .info-box h3 { margin-bottom: 6px; }

    .mode-toggle {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .mode-toggle label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .mode-toggle input:checked + span { color: #00d4ff; font-weight: bold; }

    .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-danger { background: #e94560; color: white; }
    .btn-primary { background: #0f3460; color: #00d4ff; }
    .btn-success { background: #1b9c4e; color: white; }

    .status-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .phil-badge {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 11px;
      border: 1px solid;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 60px;
    }
    .phil-badge .pname { font-weight: bold; }
    .phil-badge .pstate { font-size: 10px; }
    .phil-badge .pchop { font-size: 10px; color: #888; }
    .phil-badge.thinking { border-color: #555; color: #888; }
    .phil-badge.hungry { border-color: #ffd93d; color: #ffd93d; }
    .phil-badge.eating { border-color: #6bcb77; color: #6bcb77; }
    .phil-badge.deadlock { border-color: #ff4444; color: #ff4444; background: #2a0000; }

    .table-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
    }
    .legend span { display: flex; align-items: center; gap: 5px; }

    .log-box {
      background: #0d1b2a;
      border-radius: 8px;
      padding: 12px;
      height: 160px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.8;
    }
    .log-line { border-bottom: 1px solid #1a2a4a; padding: 1px 4px; }
    .log-line.eat { color: #6bcb77; }
    .log-line.lock { color: #ffd93d; }
    .log-line.unlock { color: #6bcb77; }
    .log-line.hungry { color: #ffd93d; }
    .log-line.deadlock { color: #ff4444; font-weight: bold; }
    .log-line.info { color: #555; }
    .log-line.sequential { color: #00d4ff; }
  </style>
</head>
<body>
<a class="back-btn" href="../index.html">← 返回</a>

<div class="container">
  <h1>🍜 哲學家用餐問題</h1>

  <div class="info-box danger">
    <h3>🔴 無順序（會死結）</h3>
    每個哲學家都「先拿左邊、再拿右邊」筷子。當5人同時搶走左邊的筷子，右邊都被鄰居拿著 → <strong>循環等待，死結！</strong>
  </div>

  <div class="info-box green">
    <h3>🟢 固定順序（防死結）</h3>
    規定：所有哲學家都先拿「編號較小的筷子」。例如：都先搶筷子0，P0先拿到後吃飯→釋放→P1才能繼續。不會形成循環，不會死結。
  </div>

  <div class="mode-toggle">
    <label>
      <input type="radio" name="mode" value="unsafe" checked onchange="setMode('unsafe')">
      <span>🔴 無順序（左手優先）→ 死結</span>
    </label>
    <label>
      <input type="radio" name="mode" value="safe" onchange="setMode('safe')">
      <span>🟢 固定順序（先拿編號小的）→ 不死結</span>
    </label>
  </div>

  <div class="controls">
    <button class="btn-success" id="btnStep" onclick="doStep()">⚡ 單步執行</button>
    <button class="btn-danger" id="btnAuto" onclick="startAuto()">▶ 自動執行</button>
    <button class="btn-primary" onclick="resetSim()">🔄 重置</button>
  </div>

  <div class="status-row" id="statusRow"></div>

  <div class="legend">
    <span>🟡 飢餓</span>
    <span>🟢 吃飯</span>
    <span>⚫ 思考</span>
    <span>🔴 死結</span>
    <span>🥢 金色=已被拿</span>
  </div>

  <div class="table-wrapper">
    <!--
      圓桌 SVG 精確佈局（半徑160，中心200,200）：
      P0: -90°(頂), P1: -18°, P2: 54°, P3: 126°, P4: 198° (均分72°)
      chop[i] 在 P_i 和 P_{i+1} 中間，角度 bisector，半徑約132（半徑-哲學家半徑+筷子半徑）
    -->
    <svg width="420" height="420" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <!-- 桌子 -->
      <ellipse cx="200" cy="200" rx="90" ry="50" fill="#16213e" stroke="#0f3460" stroke-width="2"/>

      <!-- 筷子（粗線條，精確座標） -->
      <line id="chop-line-0" x1="80"  y1="48"  x2="108" y2="72"  stroke="#555" stroke-width="7" stroke-linecap="round"/>
      <line id="chop-line-1" x1="238" y1="138" x2="266" y2="164" stroke="#555" stroke-width="7" stroke-linecap="round"/>
      <line id="chop-line-2" x1="186" y1="299" x2="214" y2="325" stroke="#555" stroke-width="7" stroke-linecap="round"/>
      <line id="chop-line-3" x1="38"  y1="336" x2="64"  y2="362" stroke="#555" stroke-width="7" stroke-linecap="round"/>
      <line id="chop-line-4" x1="80"  y1="188" x2="108" y2="164" stroke="#555" stroke-width="7" stroke-linecap="round"/>

      <!-- 筷子編號 -->
      <text id="chop-label-0" x="94"  y="40"  fill="#555" font-size="10" text-anchor="middle" font-family="Courier New">🥢0</text>
      <text id="chop-label-1" x="252" y="132" fill="#555" font-size="10" text-anchor="middle" font-family="Courier New">🥢1</text>
      <text id="chop-label-2" x="200" y="348" fill="#555" font-size="10" text-anchor="middle" font-family="Courier New">🥢2</text>
      <text id="chop-label-3" x="51"  y="380" fill="#555" font-size="10" text-anchor="middle" font-family="Courier New">🥢3</text>
      <text id="chop-label-4" x="51"  y="180" fill="#555" font-size="10" text-anchor="middle" font-family="Courier New">🥢4</text>

      <!-- 哲學家圓圈（半徑28） -->
      <g id="phil-g-0" transform="translate(200,40)"><circle r="28" fill="#0f3460" stroke="#555" stroke-width="2"/><text y="4" text-anchor="middle" fill="#888" font-size="11" font-family="Courier New" font-weight="bold">P0</text><text id="phil-state-0" y="16" text-anchor="middle" fill="#888" font-size="9" font-family="Courier New">思考</text></g>
      <g id="phil-g-1" transform="translate(352,151)"><circle r="28" fill="#0f3460" stroke="#555" stroke-width="2"/><text y="4" text-anchor="middle" fill="#888" font-size="11" font-family="Courier New" font-weight="bold">P1</text><text id="phil-state-1" y="16" text-anchor="middle" fill="#888" font-size="9" font-family="Courier New">思考</text></g>
      <g id="phil-g-2" transform="translate(294,329)"><circle r="28" fill="#0f3460" stroke="#555" stroke-width="2"/><text y="4" text-anchor="middle" fill="#888" font-size="11" font-family="Courier New" font-weight="bold">P2</text><text id="phil-state-2" y="16" text-anchor="middle" fill="#888" font-size="9" font-family="Courier New">思考</text></g>
      <g id="phil-g-3" transform="translate(106,329)"><circle r="28" fill="#0f3460" stroke="#555" stroke-width="2"/><text y="4" text-anchor="middle" fill="#888" font-size="11" font-family="Courier New" font-weight="bold">P3</text><text id="phil-state-3" y="16" text-anchor="middle" fill="#888" font-size="9" font-family="Courier New">思考</text></g>
      <g id="phil-g-4" transform="translate(48,151)"><circle r="28" fill="#0f3460" stroke="#555" stroke-width="2"/><text y="4" text-anchor="middle" fill="#888" font-size="11" font-family="Courier New" font-weight="bold">P4</text><text id="phil-state-4" y="16" text-anchor="middle" fill="#888" font-size="9" font-family="Courier New">思考</text></g>
    </svg>
  </div>

  <div class="log-box" id="logBox"></div>
</div>

<script>
const N = 5;
const PHIL_R = 160; // 哲學家所在圓的半徑
const CX = 200, CY = 200; // 中心
const PHIL_RADIUS = 28;  // 哲學家圓圈半徑
const CHOP_LEN = 22;     // 筷子長度
const CHOP_GAP = 8;      // 筷子與哲學家的間距

// 哲學家位置：從top開始每隔72度
// phil[i] 的圓心
function philPos(i) {
  const angleDeg = -90 + i * 72;
  const angleRad = angleDeg * Math.PI / 180;
  return {
    x: CX + PHIL_R * Math.cos(angleRad),
    y: CY + PHIL_R * Math.sin(angleRad)
  };
}

// 筷子i: 在 phil[i] 和 phil[(i+1)%5] 的連線上
// 筷子從 phil[i] 的邊緣延伸到 phil[(i+1)%5] 的邊緣
function chopPos(i) {
  const p1 = philPos(i);
  const p2 = philPos((i + 1) % N);
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const ux = dx / dist, uy = dy / dist;
  // 從 p1 往外移動到圓周邊緣，再到筷子尾端
  const startX = p1.x + ux * (PHIL_RADIUS + CHOP_GAP);
  const startY = p1.y + uy * (PHIL_RADIUS + CHOP_GAP);
  const endX = p1.x + ux * (PHIL_RADIUS + CHOP_GAP + CHOP_LEN);
  const endY = p1.y + uy * (PHIL_RADIUS + CHOP_GAP + CHOP_LEN);
  return { x1: startX, y1: startY, x2: endX, y2: endY, angle: Math.atan2(dy, dx) * 180 / Math.PI };
}

let chopsticks = new Array(N).fill(false);
let state = new Array(N).fill('thinking');
let useOrder = false;
let deadlockDetected = false;
let eatCount = new Array(N).fill(0);
let autoTimer = null;
let globalSeq = 0;
let currentPhil = 0;

// 筷子共享：chop[i] 由 P_i 和 P_{i+1} 共享
// P_i 的右筷子 = chop[i]，P_i 的左筷子 = chop[(i-1)%5]
function left(i) { return (i - 1 + N) % N; }
function right(i) { return i; }

function log(msg, type = 'info') {
  const box = document.getElementById('logBox');
  const div = document.createElement('div');
  div.className = 'log-line ' + type;
  div.textContent = `[${++globalSeq}] ${msg}`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function updateUI() {
  for (let i = 0; i < N; i++) {
    const g = document.getElementById('phil-g-' + i);
    const stateText = document.getElementById('phil-state-' + i);
    const circle = g.querySelector('circle');
    g.setAttribute('class', 'phil-' + i);
    const labels = ['思考', '飢餓', '吃飯', '死結'];
    const colors = ['#888', '#ffd93d', '#6bcb77', '#ff4444'];
    const idx = state[i] === 'thinking' ? 0 : state[i] === 'hungry' ? 1 : state[i] === 'eating' ? 2 : 3;
    stateText.textContent = labels[idx];
    stateText.setAttribute('fill', colors[idx]);
    const strokeColor = colors[idx];
    circle.setAttribute('stroke', strokeColor);
    circle.setAttribute('fill', idx === 0 ? '#0f3460' : idx === 1 ? '#1a1a00' : idx === 2 ? '#001a0a' : '#2a0000');
  }
  // 筷子顏色
  for (let i = 0; i < N; i++) {
    const line = document.getElementById('chop-line-' + i);
    const label = document.getElementById('chop-label-' + i);
    if (chopsticks[i]) {
      line.setAttribute('stroke', '#ffd93d');
      label.setAttribute('fill', '#ffd93d');
    } else {
      line.setAttribute('stroke', '#555');
      label.setAttribute('fill', '#555');
    }
  }
  // 狀態列
  const row = document.getElementById('statusRow');
  row.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const div = document.createElement('div');
    div.className = 'phil-badge ' + state[i];
    const label = state[i] === 'thinking' ? '思考' : state[i] === 'hungry' ? '飢餓' : state[i] === 'eating' ? '吃飯' : '死結';
    const chopL = chopsticks[left(i)] ? '✓L' : '·L';
    const chopR = chopsticks[right(i)] ? '✓R' : '·R';
    div.innerHTML = `<span class="pname">P${i}</span><span class="pstate">${label}</span><span class="pchop">${chopL} ${chopR}</span>`;
    row.appendChild(div);
  }
}

function tryAcquire(i) {
  if (useOrder) {
    const [first, second] = left(i) < right(i) ? [left(i), right(i)] : [right(i), left(i)];
    if (!chopsticks[first]) {
      chopsticks[first] = true;
      log(`P${i} 拿到🥢${first}（編號小）`, 'lock');
      if (!chopsticks[second]) {
        chopsticks[second] = true;
        log(`P${i} 拿到🥢${second} → 開始吃飯！`, 'eat');
        return 'eating';
      } else {
        log(`P${i} 等🥢${second}（被鄰居拿著）→ 釋放🥢${first}`, 'hungry');
        chopsticks[first] = false;
        return 'hungry';
      }
    } else {
      log(`P${i} 等🥢${first}...（被鄰居拿著）`, 'hungry');
      return 'hungry';
    }
  } else {
    if (!chopsticks[left(i)]) {
      chopsticks[left(i)] = true;
      log(`P${i} 拿到🥢${left(i)}（左手）`, 'lock');
      if (!chopsticks[right(i)]) {
        chopsticks[right(i)] = true;
        log(`P${i} 拿到🥢${right(i)} → 吃飯！`, 'eat');
        return 'eating';
      } else {
        log(`P${i} 等🥢${right(i)}（被P${right(i)}拿著）→ 持有🥢${left(i)}不放`, 'hungry');
        return 'hungry'; // 沒釋放左手 → 死結根源
      }
    } else {
      log(`P${i} 等🥢${left(i)}...（被P${left(i)}拿著）`, 'hungry');
      return 'hungry';
    }
  }
}

function release(i) {
  chopsticks[left(i)] = false;
  chopsticks[right(i)] = false;
  log(`P${i} 吃完，放下🥢${left(i)}和🥢${right(i)}`, 'unlock');
  state[i] = 'thinking';
}

function checkDeadlock() {
  return state.every(s => s === 'hungry') && !state.some(s => s === 'eating');
}

function doStep() {
  if (deadlockDetected) return;
  let madeProgress = false;

  for (let attempt = 0; attempt < N; attempt++) {
    const i = (currentPhil + attempt) % N;
    if (state[i] === 'thinking') {
      state[i] = 'hungry';
      log(`P${i} 感到飢餓`, 'hungry');
      const result = tryAcquire(i);
      state[i] = result;
      if (result === 'eating') eatCount[i]++;
      madeProgress = true;
      break;
    }
    if (state[i] === 'hungry') {
      const result = tryAcquire(i);
      state[i] = result;
      if (result === 'eating') eatCount[i]++;
      madeProgress = true;
      break;
    }
    if (state[i] === 'eating') {
      release(i);
      madeProgress = true;
      break;
    }
  }

  currentPhil = (currentPhil + 1) % N;
  updateUI();

  if (checkDeadlock()) {
    state = state.map(() => 'deadlock');
    deadlockDetected = true;
    log('⚠ DEADLOCK! 所有哲學家都在等鄰居的筷子，循環等待形成！', 'deadlock');
    updateUI();
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  }
}

function startAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btnAuto').textContent = '▶ 自動執行'; return; }
  document.getElementById('btnAuto').textContent = '⏸ 暫停';
  autoTimer = setInterval(doStep, 700);
}

function resetSim() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btnAuto').textContent = '▶ 自動執行'; }
  chopsticks = new Array(N).fill(false);
  state = new Array(N).fill('thinking');
  eatCount = new Array(N).fill(0);
  globalSeq = 0;
  deadlockDetected = false;
  currentPhil = 0;
  document.getElementById('logBox').innerHTML = '';
  if (!useOrder) {
    log('🔴 模式：無順序（左手優先）→ 觀察死結形成', 'info');
  } else {
    log('🟢 模式：固定順序（先拿編號小的）→ 正常運作，不死結', 'sequential');
  }
  updateUI();
}

function setMode(mode) {
  useOrder = (mode === 'safe');
  resetSim();
}

resetSim();
</script>
</body>
</html>
