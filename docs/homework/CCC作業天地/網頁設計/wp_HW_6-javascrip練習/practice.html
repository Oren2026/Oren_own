<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript 函式實作練習 — wp_HW_6</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>🧩 JavaScript 函式實作練習</h1>
  <button class="theme-toggle" id="themeToggle">🌙 深色</button>
</header>

<main id="app"></main>

<script src="data/practice_questions.js"></script>
<script>
/* ─── Theme ─── */
const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('js_hw_theme') || 'light';
applyTheme(savedTheme);

themeToggle.addEventListener('click', () => {
  const next = document.body.classList.contains('dark') ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('js_hw_theme', next);
});

function applyTheme(theme) {
  if (theme === 'dark') {
    document.body.classList.add('dark');
    themeToggle.textContent = '☀️ 淺色';
  } else {
    document.body.classList.remove('dark');
    themeToggle.textContent = '🌙 深色';
  }
}

/* ─── State ─── */
let current = 0;
let outputs = new Array(PRACTICE_QUESTIONS.length).fill(null);
let isRunning = false;

/* ─── Highlight code ─── */
function highlight(code) {
  return code
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\/\/.*/g,       '<span class="comment">$&</span>')
    .replace(/\b(function|return|const|let|var|if|else|for|of|in)\b/g, '<span class="keyword">$1</span>')
    .replace(/\b(\w+)(?=\s*\()/g, '<span class="function_">$1</span>')
    .replace(/\b(\d+\.?\d*)\b/g, '<span class="number">$1</span>')
    .replace(/"([^"]*)"/g,     '<span class="string">"$1"</span>')
    .replace(/'([^']*)'/g,     '<span class="string">\'$1\'</span>')
    .replace(/__(\w+)__/g,     '<span class="var-pre">__$1__</span>');
}

/* ─── Run question ─── */
function runQuestion(idx) {
  if (isRunning) return;
  const q = PRACTICE_QUESTIONS[idx];

  // Collect current variable values
  const vars = {};
  q.variables.forEach(v => {
    const el = document.getElementById(`var-${idx}-${v.key}`);
    if (el) vars[v.key] = parseFloat(el.value);
  });

  // Show loading state
  const outEl = document.getElementById(`output-${idx}`);
  outEl.innerHTML = '<span class="output-waiting">⏳ 執行中...</span>';
  isRunning = true;

  const ms = q.id === 9 ? vars.MS || 2000 : 0;

  setTimeout(() => {
    try {
      const result = q.run(vars);
      outEl.innerHTML = `<div class="output-label">輸出結果</div><div class="output-text">${result}</div>`;
      outputs[idx] = result;
    } catch(e) {
      outEl.innerHTML = `<div class="output-label">錯誤</div><div class="output-text" style="color:#e17055;">${e.message}</div>`;
    }
    isRunning = false;
  }, ms);
}

/* ─── Restore defaults ─── */
function restoreDefaults(idx) {
  const q = PRACTICE_QUESTIONS[idx];
  q.variables.forEach(v => {
    const el = document.getElementById(`var-${idx}-${v.key}`);
    if (el) el.value = v.default;
  });
}

/* ─── Navigation ─── */
function goTo(idx) {
  current = idx;
  render();
}

function prev() { if (current > 0) { current--; render(); } }
function next() { if (current < PRACTICE_QUESTIONS.length - 1) { current++; render(); } }

/* ─── Render ─── */
function render() {
  const app = document.getElementById('app');
  const q = PRACTICE_QUESTIONS[current];

  /* Progress dots */
  const dots = PRACTICE_QUESTIONS.map((_, i) => {
    let cls = 'p-dot';
    if (i === current)             cls += ' current';
    else if (outputs[i] !== null) cls += ' done';
    return `<div class="${cls}" onclick="goTo(${i})">${i + 1}</div>`;
  }).join('');

  /* Variable inputs */
  const varInputs = q.variables.map(v => `
    <div class="var-field">
      <label for="var-${q.id}-${v.key}">${v.label}</label>
      <input type="number" id="var-${q.id}-${v.key}" value="${v.default}"
        onkeydown="if(event.key==='Enter')runQuestion(${current})">
    </div>`).join('');

  /* Output area */
  const outputHtml = outputs[current] !== null
    ? `<div class="output-label">輸出結果</div><div class="output-text">${outputs[current]}</div>`
    : `<span class="output-waiting">⬆ 點擊「▶ 執行」查看輸出結果</span>`;

  app.innerHTML = `
    <div class="practice-progress">${dots}</div>

    <div class="card">
      <div class="question-meta">第 ${current + 1} 題 / 共 ${PRACTICE_QUESTIONS.length} 題</div>
      <div class="question-text">${q.title}</div>
      <p class="section-desc">${q.desc}</p>

      <div class="code-block">
        <pre>${highlight(q.code)}</pre>
      </div>

      <div class="var-row">${varInputs}</div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="run-btn" onclick="runQuestion(${current})">
          ▶ 執行
        </button>
        <button class="run-btn" style="background:#636e72;" onclick="restoreDefaults(${current})">
          ↺ 恢復預設
        </button>
      </div>

      <div class="output-panel" id="output-${current}">
        ${outputHtml}
      </div>

      <div class="practice-nav">
        <button class="btn btn-prev" onclick="prev()" ${current === 0 ? 'disabled' : ''}>← 上一題</button>
        <button class="btn btn-next" onclick="next()" ${current === PRACTICE_QUESTIONS.length - 1 ? 'disabled' : ''}>下一題 →</button>
      </div>
    </div>

    <footer>
      由 <a href="https://github.com/Oren2026">Oren</a> 維護 · wp_HW_6-javascrip練習
    </footer>`;
}

render();
</script>
</body>
</html>
