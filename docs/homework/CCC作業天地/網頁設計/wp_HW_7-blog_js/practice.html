<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wp_HW_7-blog_js — CCC 作業天地</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>📝 wp_HW_7-blog_js</h1>
  <button class="theme-toggle" id="themeToggle">🌙 深色</button>
</header>

<main>
  <a href="index.html" class="back-link">← 返回首頁</a>

  <div class="split-layout">
    <!-- 左側：部落格編輯器 -->
    <div class="left-panel" id="leftPanel">
      <div class="card">
        <div class="q-meta">🛠️ 部落格編輯器</div>
        <div class="q-title">即時操控日誌，觀察 JS 語法連動</div>
        <div class="q-desc">改任何一個欄位，右側預覽即時更新。卷動右側查看不同概念的程式碼示範。</div>

        <div class="var-field">
          <label for="f-id">文章 ID</label>
          <input type="number" id="f-id" value="1" min="1" max="99" oninput="syncAll()">
        </div>
        <div class="var-field">
          <label for="f-title">標題</label>
          <input type="text" id="f-title" value="掌握 JavaScript 函式" oninput="syncAll()">
        </div>
        <div class="var-field">
          <label for="f-content">內容</label>
          <textarea id="f-content" rows="3" oninput="syncAll()">JavaScript 函式是現代開發的核心元件，靈活運用能大幅提升程式碼品質。</textarea>
        </div>
        <div class="var-field">
          <label for="f-author">作者</label>
          <input type="text" id="f-author" value="Alice" oninput="syncAll()">
        </div>
        <div class="var-field">
          <label for="f-tags">標籤（逗號分隔）</label>
          <input type="text" id="f-tags" value="js, 函式, ES6" oninput="syncAll()">
        </div>
        <div class="var-field">
          <label for="f-user">目前訪客名稱（Q8 用）</label>
          <input type="text" id="f-user" value="Guest" oninput="syncAll()">
        </div>
        <div class="var-field">
          <label for="f-limit">預覽截斷字元數（Q9 用）</label>
          <input type="number" id="f-limit" value="20" min="5" max="50" oninput="syncAll()">
        </div>
        <div class="var-field">
          <label>
            <input type="checkbox" id="f-ternary" checked onchange="syncAll()">
            使用三元運算（Q8）/ 截斷（Q9）
          </label>
        </div>

        <button class="reset-btn" onclick="resetDefaults()">↺ 恢復預設</button>
      </div>
    </div>

    <!-- 右側：日誌預覽 + JS 概念串聯 -->
    <div class="right-panel">
      <div class="blog-frame">
        <div class="blog-header">📝 Express Blog 即時預覽</div>
        <div class="blog-body" id="blogPreview"></div>
      </div>
    </div>
  </div>

  <!-- 概念說明（卷軸向下） -->
  <div class="concept-grid" id="conceptGrid"></div>
</main>

<script>
/* ─── 部落格資料 ─── */
var BLOG_DB = [
  { id: 1, title: "掌握 JavaScript 函式", content: "JavaScript 函式是現代開發的核心元件，靈活運用能大幅提升程式碼品質。", author: "Alice", tags: ["js","函式","ES6"] },
  { id: 2, title: "Node.js 入門指南",      content: "Node.js 讓你可以用 JS 寫後端，了解非同步與事件驅動是關鍵。",    author: "Bob",   tags: ["node","後端"] },
  { id: 3, title: "Express 路由設計",      content: "RESTful API 的基礎在於良好的路由設計，掌握 params 與 query。",  author: "Carol", tags: ["express","api"] }
];

/* ─── 讀取目前表單資料 ─── */
function getFormData() {
  return {
    id:      parseFloat(document.getElementById('f-id').value) || 1,
    title:   document.getElementById('f-title').value,
    content: document.getElementById('f-content').value,
    author:  document.getElementById('f-author').value,
    tags:    document.getElementById('f-tags').value.split(',').map(function(s){ return s.trim(); }).filter(Boolean),
    user:    document.getElementById('f-user').value,
    limit:   parseFloat(document.getElementById('f-limit').value) || 20,
    ternary: document.getElementById('f-ternary').checked
  };
}

/* ─── Q1：物件屬性存取 ─── */
function q1_dotBracket(post) {
  var dot    = post.title;
  var bracket = post["title"];
  return { dot: dot, bracket: bracket };
}

/* ─── Q2：解構賦值 ─── */
function q2_destructuring(post) {
  var title   = post.title;
  var content = post.content;
  var author  = post.author;
  return { title: title, content: content, author: author };
}

/* ─── Q3：forEach 列表 ─── */
function q3_foreach(posts) {
  var html = '';
  for (var i = 0; i < posts.length; i++) {
    html += '<div class="post-item">' + escHtml(posts[i].title) + '</div>';
  }
  return html;
}

/* ─── Q4：req.params 查詢 ─── */
function q4_params(id) {
  var params = {};
  params["id"] = id;
  var match = null;
  for (var i = 0; i < BLOG_DB.length; i++) {
    if (BLOG_DB[i].id === params.id) { match = BLOG_DB[i]; break; }
  }
  return { params: params, post: match };
}

/* ─── Q5：错误優先回呼（概念展示） ─── */
function q5_callback(id, cb) {
  cb(null, { id: id, status: "success", message: "資料庫查詢完成" });
}

/* ─── Q6：JSON 序列化 ─── */
function q6_json(post) {
  var obj   = { id: post.id, title: post.title, content: post.content, author: post.author, tags: post.tags };
  var str   = JSON.stringify(obj);
  var parsed = JSON.parse(str);
  return { str: str, parsed: parsed };
}

/* ─── Q7：fakeGet 查詢 ─── */
function q7_fakeget(sql, params, cb) {
  var found = null;
  for (var i = 0; i < BLOG_DB.length; i++) {
    if (BLOG_DB[i].id === params[0]) { found = BLOG_DB[i]; break; }
  }
  cb(null, found);
}

/* ─── Q8：三元運算 ─── */
function q8_ternary(userName) {
  var user = userName || null;
  var display = user ? user : "Stranger";
  var html = "<h1>Welcome, " + display + "</h1>";
  return { user: user, display: display, html: html };
}

/* ─── Q9：內容截斷 ─── */
function q9_truncate(content, limit) {
  return content.length > limit ? content.slice(0, limit) + "..." : content;
}

/* ─── Q10：错误優先 callback（概念展示） ─── */
function q10_checkadmin(role, cb) {
  if (role !== "admin") cb("Access Denied"); else cb(null, "Welcome, Admin!");
}

/* ─── 主要同步函式 ─── */
function syncAll() {
  var d = getFormData();

  /* Q4：用 ID 查詢整筆 post */
  var q4r = q4_params(d.id);
  var post = q4r.post || { id: d.id, title: d.title, content: d.content, author: d.author, tags: d.tags };

  /* Q1 */
  var q1r = q1_dotBracket(post);

  /* Q2 */
  var q2r = q2_destructuring(post);

  /* Q3：所有文章列表 */
  var posts = BLOG_DB.slice();

  /* Q6 */
  var q6r = q6_json(post);

  /* Q8 */
  var q8r = q8_ternary(d.user);

  /* Q9 */
  var truncatedContent = q9_truncate(d.content, d.limit);
  var truncatedTitle   = q9_truncate(d.title, d.limit);

  /* Q5：錯誤優先 callback 結果 */
  var q5result = null;
  q5_callback(d.id, function(err, data) {
    q5result = err ? "錯誤：" + err : "成功：" + JSON.stringify(data);
    renderPreview(d, post, q1r, q2r, q3_foreach(posts), q4r, q6r, q8r, truncatedContent, truncatedTitle, q5result);
  });
}

/* ─── 渲染右側預覽 ─── */
function renderPreview(d, post, q1r, q2r, listHtml, q4r, q6r, q8r, truncContent, truncTitle, q5result) {
  var el = document.getElementById('blogPreview');
  var tagHtml = '';
  for (var i = 0; i < d.tags.length; i++) {
    tagHtml += '<span class="post-tag">' + escHtml(d.tags[i]) + '</span>';
  }

  var preview = '';
  if (d.ternary) {
    /* 使用截斷預覽 */
    preview = '<div class="post-single">'
      + '<div class="post-title">' + escHtml(truncTitle) + '</div>'
      + '<div class="post-content">' + escHtml(truncContent) + '</div>'
      + '<div class="post-meta">作者：' + escHtml(d.author) + ' · ' + tagHtml + '</div>'
      + '</div>';
  } else {
    /* 完整預覽 */
    preview = '<div class="post-single">'
      + '<div class="post-title">' + escHtml(post.title) + '</div>'
      + '<div class="post-content">' + escHtml(post.content) + '</div>'
      + '<div class="post-meta">作者：' + escHtml(post.author) + ' · ' + tagHtml + '</div>'
      + '</div>';
  }

  /* Q8 greeting */
  var greeting = '<div class="Welcome-banner">' + q8r.html + '</div>';

  el.innerHTML = greeting + preview + '<div class="post-list">' + listHtml + '</div>';
}

/* ─── 底部概念區 ─── */
function renderConcepts() {
  var d = getFormData();

  var q4r = q4_params(d.id);
  var post = q4r.post || { id: d.id, title: d.title, content: d.content, author: d.author, tags: d.tags };

  var q1r = q1_dotBracket(post);
  var q2r = q2_destructuring(post);
  var q6r = q6_json(post);
  var q8r = q8_ternary(d.user);
  var truncContent = q9_truncate(d.content, d.limit);

  var q5result = null;
  q5_callback(d.id, function(err, data) {
    q5result = err ? "錯誤：" + err : "成功：" + JSON.stringify(data);
    buildConceptHtml(d, post, q1r, q2r, q6r, q8r, truncContent, q5result);
  });
}

function buildConceptHtml(d, post, q1r, q2r, q6r, q8r, truncContent, q5result) {
  var html = '';

  /* Q1 區塊 */
  html += '<div class="card concept-card">'
    + '<div class="q-meta">1｜物件屬性存取 (Dot &amp; Bracket Notation)</div>'
    + '<div class="q-desc">post.title 與 post["title"] 取同一個值。以下是實際操作：</div>'
    + '<div class="code-block"><pre>'
    + 'const post = { id: ' + post.id + ', title: "' + escJs(post.title) + '" };\n'
    + 'post.title        → "' + escHtml(q1r.dot) + '"\n'
    + 'post["title"]     → "' + escHtml(q1r.bracket) + '"'
    + '</pre></div>'
    + '<div class="output-block"><span class="label">輸出</span><pre>'
    + 'post.title        → <span class="str">"' + escHtml(q1r.dot) + '"</span>\n'
    + 'post["title"]     → <span class="str">"' + escHtml(q1r.bracket) + '"</span>'
    + '</pre></div>'
    + '</div>';

  /* Q2 區塊 */
  html += '<div class="card concept-card">'
    + '<div class="q-meta">2｜物件解構賦值 (Destructuring)</div>'
    + '<div class="q-desc">解構讓你用一行從物件取出多個屬性：</div>'
    + '<div class="code-block"><pre>'
    + 'const { title, content, author } = post;\n'
    + '// 相當於：\n'
    + 'const title   = post.title;\n'
    + 'const content = post.content;\n'
    + 'const author  = post.author;'
    + '</pre></div>'
    + '<div class="output-block"><span class="label">輸出</span><pre>'
    + 'title   → <span class="str">"' + escHtml(q2r.title) + '"</span>\n'
    + 'content → <span class="str">"' + escHtml(q2r.content.slice(0,30)) + '..."</span>\n'
    + 'author  → <span class="str">"' + escHtml(q2r.author) + '"</span>'
    + '</pre></div>'
    + '</div>';

  /* Q3 區塊 */
  html += '<div class="card concept-card">'
    + '<div class="q-meta">3｜陣列遍歷與 HTML 拼接 (forEach)</div>'
    + '<div class="q-desc">forEach 把文章陣列拼成 HTML 字串，送回瀏覽器渲染列表：</div>'
    + '<div class="code-block"><pre>'
    + 'posts.forEach(post => {\n'
    + '  html += `<div class="post-item">${post.title}</div>`;\n'
    + '});'
    + '</pre></div>'
    + '<div class="output-block"><span class="label">輸出</span>'
    + '<div class="post-list">' + q3_foreach(BLOG_DB.slice()) + '</div>'
    + '</div></div>';

  /* Q4 區塊 */
  var q4r = q4_params(d.id);
  html += '<div class="card concept-card">'
    + '<div class="q-meta">4｜URL 參數與字典 (req.params)</div>'
    + '<div class="q-desc">app.get("/posts/:id") 的 :id 是 URL 參數，req.params 是個字典：</div>'
    + '<div class="code-block"><pre>'
    + '// 使用者拜訪 /posts/' + d.id + '\n'
    + 'const params = {};\n'
    + 'params["id"] = ' + d.id + ';\n'
    + '// params → { id: ' + d.id + ' }'
    + '</pre></div>'
    + '<div class="output-block"><span class="label">params</span><pre>'
    + '{ id: ' + q4r.params.id + ' }'
    + '</pre></div>'
    + '<div class="output-block"><span class="label">查詢結果</span><pre>'
    + (q4r.post
      ? '<span class="str">"' + escHtml(q4r.post.title) + '"</span> by ' + escHtml(q4r.post.author)
      : '<span class="Error-hint">找不到 ID 為 ' + d.id + ' 的文章</span>')
    + '</pre></div>'
    + '</div>';

  /* Q5 區塊 */
  html += '<div class="card concept-card">'
    + '<div class="q-meta">5｜錯誤優先回呼 (Error-First Callback)</div>'
    + '<div class="q-desc">Node.js 慣例：第一個參數是錯誤，沒錯傳 null，第二個才是資料：</div>'
    + '<div class="code-block"><pre>'
    + 'function fetchData(id, callback) {\n'
    + '  const data = { id: id, status: "success" };\n'
    + '  callback(null, data);  // null = 無錯誤\n'
    + '}\n\n'
    + 'fetchData(' + d.id + ', (err, data) => {\n'
    + '  if (err) return console.error(err);\n'
    + '  console.log(data);  // { id: ' + d.id + ', status: "success" }\n'
    + '});'
    + '</pre></div>'
    + '<div class="output-block"><span class="label">實際執行</span><pre>'
    + escHtml(q5result)
    + '</pre></div>'
    + '</div>';

  /* Q6 區塊 */
  html += '<div class="card concept-card">'
    + '<div class="q-meta">6｜JSON 解析 (JSON.parse)</div>'
    + '<div class="q-desc">JSON.stringify 把 JS 物件變字串，JSON.parse 把字串變回物件：</div>'
    + '<div class="code-block"><pre>'
    + 'const obj = { id: 1, title: "...", tags: [...] };\n'
    + 'const jsonStr = JSON.stringify(obj);\n'
    + 'const parsed  = JSON.parse(jsonStr);'
    + '</pre></div>'
    + '<div class="output-block"><span class="label">JSON.stringify</span><pre>'
    + escHtml(q6r.str.slice(0, 80)) + (q6r.str.length > 80 ? '...' : '')
    + '</pre></div>'
    + '<div class="output-block"><span class="label">JSON.parse</span><pre>'
    + escHtml(JSON.stringify(q6r.parsed, null, 2).slice(0, 80)) + '...'
    + '</pre></div>'
    + '</div>';

  /* Q7 區塊 */
  var q7result = null;
  q7_fakeget("SELECT * FROM posts WHERE id = ?", [d.id], function(err, row) {
    q7result = err ? "失敗：" + err : "抓到：「" + (row ? row.title : "無") + "」";
    finalize();
  });

  function finalize() {
    html += '<div class="card concept-card">'
      + '<div class="q-meta">7｜模擬 db.get 查詢 (fakeGet)</div>'
      + '<div class="q-desc">真實資料庫的查詢流程：SQL + 參數 + callback：</div>'
      + '<div class="code-block"><pre>'
      + 'function fakeGet(sql, params, cb) {\n'
      + '  // 模擬 db.get(sql, params, callback)\n'
      + '  cb(null, { id: params[0], title: "..." });\n'
      + '}\n\n'
      + 'fakeGet(\n'
      + '  "SELECT * FROM posts WHERE id = ?",\n'
      + '  [' + d.id + '],\n'
      + '  (err, row) => { ... }\n'
      + ');'
      + '</pre></div>'
      + '<div class="output-block"><span class="label">執行結果</span><pre>'
      + escHtml(q7result)
      + '</pre></div>'
      + '</div>';

    /* Q8 區塊 */
    html += '<div class="card concept-card">'
      + '<div class="q-meta">8｜樣板字串邏輯運算 (三元運算)</div>'
      + '<div class="q-desc">用三元運算處理未登入訪客，自動替換成 "Stranger"：</div>'
      + '<div class="code-block"><pre>'
      + 'const user = "' + escJs(d.user) + '" || null;\n'
      + '//           ↑ 上一行的 user 值\n\n'
      + 'const displayName = user ? user : "Stranger";\n'
      + '// 或用三元：\n'
      + '// const displayName = user ?? "Stranger";\n\n'
      + 'res.send(`&lt;h1&gt;Welcome, ${displayName}&lt;/h1&gt;`);'
      + '</pre></div>'
      + '<div class="output-block"><span class="label">user = "' + escHtml(d.user) + '"</span><pre>'
      + 'displayName = <span class="str">"' + escHtml(q8r.display) + '"</span>\n'
      + 'HTML = <span class="str">' + escHtml(q8r.html) + '</span>'
      + '</pre></div>'
      + '<div class="Welcome-banner">' + q8r.html + '</div>'
      + '</div>';

    /* Q9 區塊 */
    html += '<div class="card concept-card">'
      + '<div class="q-meta">9｜內容截斷 (Substring)</div>'
      + '<div class="q-desc">slice(0, n) 限制顯示字元數，常用於文章列表預覽：</div>'
      + '<div class="code-block"><pre>'
      + 'const limit = ' + d.limit + ';\n'
      + 'const truncated = content.slice(0, limit) + "...";\n\n'
      + '// 原文：  ' + escJs(d.content) + '\n'
      + '// 截斷後：' + escJs(truncContent)
      + '</pre></div>'
      + '<div class="output-block"><span class="label">原文</span><pre>' + escHtml(d.content) + '</pre></div>'
      + '<div class="output-block"><span class="label">截斷（' + d.limit + '字）</span><pre>' + escHtml(truncContent) + '</pre></div>'
      + '</div>';

    /* Q10 區塊 */
    html += '<div class="card concept-card">'
      + '<div class="q-meta">10｜錯誤優先 callback 實作 (checkAdmin)</div>'
      + '<div class="q-desc">Express 的 db.xxx 系列幾乎都遵循 err-first callback 模式：</div>'
      + '<div class="code-block"><pre>'
      + 'function checkAdmin(role, cb) {\n'
      + '  if (role !== "admin") {\n'
      + '    cb("Access Denied");\n'
      + '  } else {\n'
      + '    cb(null, "Welcome");\n'
      + '  }\n'
      + '}\n\n'
      + 'checkAdmin("' + escJs(d.user) + '", (err, msg) => {\n'
      + '  if (err) return "✗ " + err;\n'
      + '  return "✓ " + msg;\n'
      + '});'
      + '</pre></div>'
      + '<div class="output-block"><span class="label">執行結果</span><pre>';
    var q10res = null;
    q10_checkadmin(d.user, function(err, msg) {
      q10res = err ? "✗ 錯誤：" + err : "✓ " + msg;
      html += escHtml(q10res) + '</pre></div></div>';
      document.getElementById('conceptGrid').innerHTML = html;
    });
  }
}

/* ─── 工具函式 ─── */
function escHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escJs(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,'\\n');
}

/* ─── 初始化 ─── */
function resetDefaults() {
  document.getElementById('f-id').value = 1;
  document.getElementById('f-title').value = "掌握 JavaScript 函式";
  document.getElementById('f-content').value = "JavaScript 函式是現代開發的核心元件，靈活運用能大幅提升程式碼品質。";
  document.getElementById('f-author').value = "Alice";
  document.getElementById('f-tags').value = "js, 函式, ES6";
  document.getElementById('f-user').value = "Guest";
  document.getElementById('f-limit').value = 20;
  document.getElementById('f-ternary').checked = true;
  syncAll();
}

/* ─── 主題切換 ─── */
var savedTheme = localStorage.getItem('hw7_theme') || 'light';
applyTheme(savedTheme);
document.getElementById('themeToggle').addEventListener('click', function() {
  var next = document.body.classList.contains('dark') ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('hw7_theme', next);
});
function applyTheme(theme) {
  document.body.classList.toggle('dark', theme === 'dark');
  document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️ 淺色' : '🌙 深色';
}

/* ─── 啟動 ─── */
syncAll();
renderConcepts();
</script>
</body>
</html>
