<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>開發日誌 | TB3 2026</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header class="header" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
    <h1>📝 開發日誌</h1>
    <p class="subtitle">按時間排列的實作記錄</p>
    <a href="../index.html" style="display:inline-block;margin-top:1rem;color:white;opacity:0.85;">← 返回儀表板</a>
  </header>

  <main class="container">
    <div class="section">
      <div class="section-header"><span class="icon">📅</span><h2>開發記錄</h2></div>
      <div class="section-content" id="diary-list">
        <p style="color:var(--text-light);padding:1rem;">載入中...</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>TB3 2026 FIRA AutoRace | 由 <a href="https://github.com/Oren2026" style="color:var(--primary);">Oren</a> 維護</p>
  </footer>

  <script src="../assets/js/main.js"></script>
  <script>
    (async function() {
      var el = document.getElementById('diary-list');
      try {
        var res = await fetch('../updates/updates.json');
        var data = await res.json();
        if (!data || !data.length) {
          el.innerHTML = '<p style="color:var(--text-light);padding:1rem;">暫無開發記錄</p>';
          return;
        }
        el.innerHTML = data
          .sort(function(a, b) { return b.id.localeCompare(a.id); })
          .map(function(e) {
            return '<div class="update-entry">' +
              '<div class="update-header">' +
                '<h2>' + e.title + '</h2>' +
                '<span class="update-date">' + e.date + '</span>' +
              '</div>' +
              '<div class="update-body">' +
                '<p class="tag ' + (e.category === '硬體更新' ? 'hw' : 'sys') + '">' + e.category + '</p>' +
                '<p style="margin-top:0.5rem;">' + e.summary + '</p>' +
              '</div>' +
            '</div>';
          }).join('');
      } catch(err) {
        el.innerHTML = '<p style="color:var(--danger);padding:1rem;">載入失敗：' + err.message + '</p>';
      }
    })();
  </script>
</body>
</html>
