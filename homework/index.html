<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>柯的筆記天地</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --border: rgba(49,108,244,0.12);
      --accent: #316cf4;
      --accent-dim: rgba(49,108,244,0.08);
      --accent-text: #1a3aad;
      --text: #1a1a1a;
      --muted: #5a5a6a;
      --muted-2: #9090a0;
      --card-shadow: 0 2px 12px rgba(49,108,244,0.07);
      --card-shadow-hover: 0 6px 24px rgba(49,108,244,0.14);
      --radius: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 15px;
      padding: 3rem 2rem;
    }
    .container { max-width: 680px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 3rem; }
    .header-eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .header p { color: var(--muted); font-size: 0.92rem; margin: 0; }
    .course-list { display: flex; flex-direction: column; gap: 1rem; }
    .course-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-decoration: none;
      color: var(--text);
      display: block;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      box-shadow: var(--card-shadow);
    }
    .course-card:hover {
      border-color: var(--accent);
      box-shadow: var(--card-shadow-hover);
      transform: translateY(-3px);
    }
    .course-card-top { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .course-icon { font-size: 1.8rem; }
    .course-name { font-weight: 800; font-size: 1.15rem; color: var(--accent-text); }
    .course-desc { font-size: 0.88rem; color: var(--muted); margin: 0; }
    .course-arrow { margin-left: auto; font-size: 1.2rem; color: var(--muted-2); }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-eyebrow">柯的筆記天地</div>
      <h1>📚 課程筆記</h1>
      <p>金門大學資工系 · 大一</p>
    </header>

    <div class="course-list">
      <a href="柯的筆記天地/資訊網路/index.html" class="course-card">
        <div class="course-card-top">
          <span class="course-icon">📡</span>
          <span class="course-name">資訊網路</span>
          <span class="course-arrow">→</span>
        </div>
        <p class="course-desc">OSI 七層模型、TCP/IP、網路協定、封裝概念</p>
      </a>
    </div>

    <div style="margin-top: 2.5rem; text-align: center; font-size: 0.82rem; color: var(--muted-2);">
      筆記陸續新增中 📝
    </div>
  </div>
</body>
</html>
