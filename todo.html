<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
    .container { width: 100%; max-width: 480px; }
    h1 { font-size: 24px; margin-bottom: 24px; color: #e94560; }
    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
    input[type="text"] { flex: 1; padding: 12px 16px; border: 2px solid #16213e; border-radius: 8px; background: #16213e; color: #eee; font-size: 16px; outline: none; transition: border-color 0.2s; }
    input[type="text"]:focus { border-color: #e94560; }
    button.add-btn { padding: 12px 20px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
    button.add-btn:hover { background: #ff6b6b; }
    .todo-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: #16213e; border-radius: 8px; margin-bottom: 8px; transition: opacity 0.2s; }
    .todo-item.done { opacity: 0.5; }
    .todo-item.done .todo-text { text-decoration: line-through; }
    .checkbox { width: 22px; height: 22px; border: 2px solid #e94560; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
    .todo-item.done .checkbox { background: #e94560; }
    .todo-item.done .checkbox::after { content: '✓'; color: #fff; font-size: 14px; }
    .todo-text { flex: 1; font-size: 16px; }
    .delete-btn { background: none; border: none; color: #666; font-size: 20px; cursor: pointer; padding: 4px 8px; transition: color 0.2s; }
    .delete-btn:hover { color: #e94560; }
    .empty { text-align: center; color: #666; padding: 40px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>待辦事項</h1>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="新增待辦..." onkeypress="if(event.key==='Enter')addTodo()">
      <button class="add-btn" onclick="addTodo()">新增</button>
    </div>
    <div id="todoList"></div>
  </div>
  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    function save() { localStorage.setItem('todos', JSON.stringify(todos)); }
    function render() {
      const list = document.getElementById('todoList');
      if (todos.length === 0) { list.innerHTML = '<div class="empty">沒有待辦事項</div>'; return; }
      list.innerHTML = todos.map((t, i) => `
        <div class="todo-item ${t.done ? 'done' : ''}">
          <div class="checkbox" onclick="toggle(${i})"></div>
          <span class="todo-text">${t.text}</span>
          <button class="delete-btn" onclick="del(${i})">×</button>
        </div>`).join('');
    }
    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      todos.push({ text, done: false });
      input.value = '';
      save(); render();
    }
    function toggle(i) { todos[i].done = !todos[i].done; save(); render(); }
    function del(i) { todos.splice(i, 1); save(); render(); }
    render();
  </script>
</body>
</html>
